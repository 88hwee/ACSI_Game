<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Local Hero: Versailles Defense</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    touch-action: none;
    user-select: none;
}

#game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at bottom, #1a1a2e, #000);
    overflow: hidden;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
}

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    color: white;
    z-index: 10;
    background: rgba(0,0,0,0.45);
}

.hud-label {
    font-size: 10px;
    color: #60a5fa;
    font-weight: bold;
}

.hud-value {
    font-size: 20px;
    font-family: monospace;
}

.screen {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.95);
    color: white;
    text-align: center;
    padding: 24px;
}

.hidden {
    display: none !important;
}

button {
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.big-btn {
    width: 260px;
    padding: 18px;
    border-radius: 18px;
    background: #2563eb;
    color: white;
    font-size: 18px;
}

#mcq-modal {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
}

#mcq-box {
    width: 100%;
    max-width: 450px;
    background: #111827;
    border: 3px solid #3b82f6;
    border-radius: 24px;
    padding: 24px;
    color: white;
}

.option-btn {
    width: 100%;
    min-height: 58px;
    margin-top: 10px;
    border-radius: 16px;
    background: #1f2937;
    color: white;
    text-align: left;
    padding: 14px;
    font-size: 15px;
}

.correct {
    background: #059669 !important;
}

.wrong {
    background: #dc2626 !important;
}

#mobile-controls {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: end;
    z-index: 15;
    pointer-events: none;
}

.control-group {
    display: flex;
    gap: 14px;
    pointer-events: auto;
}

.control-btn {
    width: 76px;
    height: 76px;
    border-radius: 18px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 42px;
    border: 2px solid rgba(255,255,255,0.25);
}

#btn-fire {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: #dc2626;
    color: white;
    border: 4px solid #fca5a5;
    pointer-events: auto;
}

.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
}
</style>
</head>

<body>
<div id="game-container">

<div id="hud">
    <div>
        <div class="hud-label">SCORE</div>
        <div id="score-val" class="hud-value">0000</div>
    </div>
    <div>
        <div class="hud-label">TIME</div>
        <div id="timer-val" class="hud-value">180s</div>
    </div>
    <div>
        <div class="hud-label">LIVES</div>
        <div id="lives-container" class="hud-value">🛡️🛡️🛡️🛡️🛡️</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="start-screen" class="screen">
    <h1>LOCAL HERO</h1>
    <h2>VERSAILLES DEFENSE</h2>
    <p>Survive for 180 seconds.</p>
    <p>Missed enemies have no penalty.</p>
    <p>Wrong answer = lose 1 life. You have 5 lives.</p>
    <p>Move: A/D or ← →. Shoot: Space or FIRE button.</p>
    <button id="start-btn" class="big-btn">START GAME</button>
</div>

<div id="mcq-modal" class="hidden">
    <div id="mcq-box">
        <div id="q-category">Question</div>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <div id="feedback-text"></div>
    </div>
</div>

<div id="end-screen" class="screen hidden">
    <h1 id="end-status">MISSION COMPLETE</h1>
    <h2 id="final-score-display">0000</h2>
    <p id="end-message"></p>
    <button id="restart-btn" class="big-btn">PLAY AGAIN</button>
</div>

<div id="mobile-controls">
    <div class="control-group">
        <button id="btn-left" class="control-btn">‹</button>
        <button id="btn-right" class="control-btn">›</button>
    </div>
    <button id="btn-fire">FIRE</button>
</div>

</div>

<script>
const QUESTIONS = [
    { q: "Which article was the War Guilt Clause?", a: "Article 231", o: ["Article 231", "Article 105", "Article 42", "Article 15"] },
    { q: "How much reparations was Germany forced to pay?", a: "£6,600 million", o: ["£6,600 million", "£3,300 million", "£1,100 million", "£9,900 million"] },
    { q: "German army was limited to how many men?", a: "100,000 men", o: ["100,000 men", "250,000 men", "500,000 men", "50,000 men"] },
    { q: "Which territory was returned to France?", a: "Alsace-Lorraine", o: ["Alsace-Lorraine", "Rhineland", "Danzig", "Saar"] },
    { q: "What happened to the Rhineland?", a: "Demilitarised", o: ["Demilitarised", "Given to Italy", "Split in two", "Annexed by USA"] },
    { q: "Which body was created to keep peace?", a: "League of Nations", o: ["League of Nations", "United Nations", "NATO", "European Union"] },
    { q: "Who proposed the Fourteen Points?", a: "Woodrow Wilson", o: ["Woodrow Wilson", "Lloyd George", "Clemenceau", "Kaiser Wilhelm"] }
];

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let state = {
    screen: "start",
    score: 0,
    lives: 5,
    timeLeft: 180,
    paused: false,
    lastSpawn: 0,
    lastFire: 0,
    spawnRate: 2300,
    qIndex: 0,
    questionPool: [],
    correct: 0,
    answered: 0,
    w: window.innerWidth,
    h: window.innerHeight
};

let player = {
    x: 0,
    y: 0,
    w: 60,
    h: 60,
    speed: 3,
    left: false,
    right: false
};

let bullets = [];
let enemies = [];
let particles = [];
let timer = null;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    state.w = window.innerWidth;
    state.h = window.innerHeight;

    canvas.width = state.w * dpr;
    canvas.height = state.h * dpr;
    canvas.style.width = state.w + "px";
    canvas.style.height = state.h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    player.w = Math.min(state.w * 0.15, 70);
    player.h = player.w;
    player.y = state.h - 170;
    player.speed = Math.min(4, state.w * 0.005);

    if (state.screen === "start") {
        player.x = state.w / 2 - player.w / 2;
    }
}

function startGame() {
    state.screen = "playing";
    state.score = 0;
    state.lives = 5;
    state.timeLeft = 180;
    state.paused = false;
    state.qIndex = 0;
    state.correct = 0;
    state.answered = 0;
    state.spawnRate = 2300;
    state.questionPool = shuffle([...QUESTIONS]);

    bullets = [];
    enemies = [];
    particles = [];

    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("end-screen").classList.add("hidden");

    updateHUD();

    clearInterval(timer);
    timer = setInterval(() => {
        if (state.screen === "playing" && !state.paused) {
            state.timeLeft--;
            updateHUD();

            if (state.timeLeft <= 0) {
                endGame("MISSION COMPLETE");
            }
        }
    }, 1000);
}

function resetGame() {
    clearInterval(timer);
    state.screen = "start";
    document.getElementById("end-screen").classList.add("hidden");
    document.getElementById("start-screen").classList.remove("hidden");
    resize();
    updateHUD();
}

function setupControls() {
    const left = document.getElementById("btn-left");
    const right = document.getElementById("btn-right");
    const fireBtn = document.getElementById("btn-fire");

    left.addEventListener("touchstart", e => { e.preventDefault(); player.left = true; });
    left.addEventListener("touchend", e => { e.preventDefault(); player.left = false; });

    right.addEventListener("touchstart", e => { e.preventDefault(); player.right = true; });
    right.addEventListener("touchend", e => { e.preventDefault(); player.right = false; });

    fireBtn.addEventListener("touchstart", e => { e.preventDefault(); fire(); });

    left.addEventListener("mousedown", () => player.left = true);
    left.addEventListener("mouseup", () => player.left = false);

    right.addEventListener("mousedown", () => player.right = true);
    right.addEventListener("mouseup", () => player.right = false);

    fireBtn.addEventListener("mousedown", fire);

    window.addEventListener("keydown", e => {
        const key = e.key.toLowerCase();
        if (key === "a" || key === "arrowleft") player.left = true;
        if (key === "d" || key === "arrowright") player.right = true;
        if (key === " ") fire();
    });

    window.addEventListener("keyup", e => {
        const key = e.key.toLowerCase();
        if (key === "a" || key === "arrowleft") player.left = false;
        if (key === "d" || key === "arrowright") player.right = false;
    });
}

function fire() {
    if (state.screen !== "playing" || state.paused) return;

    const now = Date.now();
    if (now - state.lastFire < 170) return;

    bullets.push({
        x: player.x + player.w / 2 - 7,
        y: player.y,
        w: 14,
        h: 38,
        speed: state.h * 0.025
    });

    state.lastFire = now;
}

function update() {
    if (state.screen !== "playing" || state.paused) return;

    if (player.left) player.x -= player.speed;
    if (player.right) player.x += player.speed;

    player.x = Math.max(0, Math.min(state.w - player.w, player.x));

    bullets.forEach((b, i) => {
        b.y -= b.speed;
        if (b.y < -50) bullets.splice(i, 1);
    });

    const now = Date.now();

    if (now - state.lastSpawn > state.spawnRate) {
        spawnEnemy();
        state.lastSpawn = now;
        state.spawnRate = Math.max(1300, state.spawnRate - 4);
    }

    enemies.forEach((en, i) => {
        en.y += en.speed;

        bullets.forEach((b, bi) => {
            if (hit(b, en)) {
                bullets.splice(bi, 1);
                enemies.splice(i, 1);
                state.score += 50;
                boom(en.x + en.w / 2, en.y + en.h / 2);
                updateHUD();

                if (Math.random() < 0.35) showQuestion();
            }
        });

        if (en.y > state.h) {
            enemies.splice(i, 1);
        }
    });

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

function spawnEnemy() {
    const size = Math.min(state.w * 0.16, 75);
    enemies.push({
        x: Math.random() * (state.w - size),
        y: -size,
        w: size,
        h: size,
        speed: (0.65 + Math.random() * 0.55) * (state.h / 800)
    });
}

function draw() {
    ctx.clearRect(0, 0, state.w, state.h);

    ctx.fillStyle = "#3b82f6";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.fillStyle = "#93c5fd";
    ctx.fillRect(player.x + player.w * 0.35, player.y - 12, player.w * 0.3, 14);

    bullets.forEach(b => {
        ctx.fillStyle = "#60a5fa";
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    enemies.forEach(en => {
        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(en.x + en.w / 2, en.y + en.h / 2, en.w / 2, 0, Math.PI * 2);
        ctx.fill();
    });

    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = "#facc15";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showQuestion() {
    state.paused = true;
    document.getElementById("mcq-modal").classList.remove("hidden");

    if (state.qIndex >= state.questionPool.length) {
        state.questionPool = shuffle([...QUESTIONS]);
        state.qIndex = 0;
    }

    const q = state.questionPool[state.qIndex];

    document.getElementById("q-category").innerText =
        `Question ${state.qIndex + 1}/${state.questionPool.length}`;

    document.getElementById("question-text").innerText = q.q;

    const container = document.getElementById("options-container");
    const feedback = document.getElementById("feedback-text");

    container.innerHTML = "";
    feedback.innerText = "";

    shuffle([...q.o]).forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;
        btn.onclick = () => answerQuestion(opt, q.a, btn);
        container.appendChild(btn);
    });
}

function answerQuestion(selected, correct, btn) {
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(b => b.disabled = true);

    state.answered++;

    if (selected === correct) {
        btn.classList.add("correct");
        state.correct++;
        state.score += 150;
        document.getElementById("feedback-text").innerText = "Correct!";
    } else {
        btn.classList.add("wrong");
        state.lives--;
        if (state.lives < 0) state.lives = 0;

        buttons.forEach(b => {
            if (b.innerText === correct) b.classList.add("correct");
        });

        document.getElementById("feedback-text").innerText =
            "Wrong. Correct answer: " + correct;

        document.getElementById("game-container").classList.add("shake");
        setTimeout(() => {
            document.getElementById("game-container").classList.remove("shake");
        }, 300);
    }

    state.qIndex++;
    updateHUD();

    setTimeout(() => {
        document.getElementById("mcq-modal").classList.add("hidden");
        state.paused = false;
    }, 1300);
}

function updateHUD() {
    document.getElementById("score-val").innerText =
        String(state.score).padStart(4, "0");

    document.getElementById("timer-val").innerText =
        state.timeLeft + "s";

    document.getElementById("lives-container").innerText =
        "🛡️".repeat(state.lives);
}

function endGame(reason) {
    state.screen = "end";
    clearInterval(timer);

    document.getElementById("mcq-modal").classList.add("hidden");
    document.getElementById("end-screen").classList.remove("hidden");

    const accuracy = state.answered > 0
        ? Math.round((state.correct / state.answered) * 100)
        : 0;

    document.getElementById("end-status").innerText = reason;
    document.getElementById("final-score-display").innerText =
        String(state.score).padStart(4, "0");

    document.getElementById("end-message").innerText =
        `Accuracy: ${accuracy}% | Correct: ${state.correct}/${state.answered} | Lives left: ${state.lives}`;
}

function hit(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function boom(x, y) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 7,
            vy: (Math.random() - 0.5) * 7,
            life: 1
        });
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

window.onload = () => {
    resize();
    setupControls();
    document.getElementById("start-btn").onclick = startGame;
    document.getElementById("restart-btn").onclick = resetGame;
    requestAnimationFrame(gameLoop);
};

window.addEventListener("resize", resize);
</script>

</body>
</html>
