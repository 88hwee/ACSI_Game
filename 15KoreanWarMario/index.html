<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Korean War Mastery: Super Revision Bros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(env(safe-area-inset-bottom));
            --sal: env(safe-area-inset-left);
            --sar: env(safe-area-inset-right);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body { 
            margin: 0; 
            background: #5c94fc; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            color: white; 
            touch-action: none; 
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }
        
        .loud-font { font-family: 'Black Ops One', cursive; }

        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
        }

        canvas { 
            display: block; 
            width: 100%;
            height: 100%;
            outline: none;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: transform 0.1s;
        }

        .control-btn:active {
            transform: scale(0.85);
            background: rgba(255, 255, 255, 0.4);
        }

        .option-btn {
            transition: all 0.2s;
            min-height: 2.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem 0.75rem;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85rem;
            line-height: 1.1;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            background: #ffffff;
            color: #1e293b;
            border: 3px solid #16a34a;
            cursor: pointer;
        }

        .option-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }

        #hud {
            padding-top: calc(0.5rem + var(--sat));
            padding-left: calc(1rem + var(--sal));
            padding-right: calc(1rem + var(--sar));
        }

        .correct-flash { background: #16a34a !important; color: white !important; border-color: #22c55e !important; }
        .wrong-flash { background: #dc2626 !important; color: white !important; border-color: #ef4444 !important; }
        
        .quiz-scroll-area {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .quiz-scroll-area::-webkit-scrollbar { width: 4px; }
        .quiz-scroll-area::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 10px; }

        @media (pointer: fine) {
            .mobile-controls { display: none; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-[110] flex flex-col items-center justify-center p-6 text-center bg-[#5c94fc]">
        <div class="mb-6 bg-green-600 p-6 rounded-[40px] shadow-2xl rotate-[-2deg] border-8 border-white">
            <h1 class="text-4xl md:text-6xl font-black text-white loud-font italic tracking-tighter uppercase">Korean War</h1>
        </div>
        <p class="text-white font-black text-xl tracking-widest mb-4 uppercase drop-shadow-lg">Super Revision Bros</p>
        
        <div id="play-tracker" class="mb-8 opacity-0 transition-opacity duration-1000 bg-white/20 px-6 py-2 rounded-full border border-white/40">
            <p class="text-[10px] text-white/80 font-bold uppercase tracking-widest">Global Deployments: <span id="global-play-count">---</span></p>
        </div>

        <div class="mb-8 text-white text-sm space-y-3 max-w-md bg-white/10 p-6 rounded-[35px] border-4 border-white/20">
            <p class="font-bold text-lg">Intel Mastery Mission</p>
            <p class="text-[11px]">Hit <span class="text-yellow-300 font-black">? BLOCKS</span> from below!</p>
            <p class="text-[11px] opacity-75">46 Questions Integrated (Easy/Medium/Hard)</p>
        </div>

        <button id="btn-start" class="px-16 py-6 bg-green-600 text-white loud-font rounded-full shadow-[0_10px_0_#14532d] active:translate-y-2 uppercase tracking-widest text-xl transition-all border-4 border-white cursor-pointer">
            DEPLOY UNIT
        </button>
    </div>

    <!-- HUD -->
    <div id="hud" class="absolute top-0 left-0 w-full flex justify-between items-start pointer-events-none z-20">
        <div class="bg-black/30 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/20">
            <p class="text-[9px] uppercase font-black text-white/70">Integrity</p>
            <p id="stats-lives" class="text-xl font-black text-red-500">❤️❤️❤️❤️❤️</p>
        </div>
        <div class="bg-black/30 backdrop-blur-md px-6 py-2 rounded-2xl border border-white/20 text-center">
            <p id="stats-q-remaining-top" class="text-[9px] uppercase font-black text-white/70">Data Entry Remaining</p>
            <p id="stats-timer" class="text-xl font-black text-yellow-300">180s</p>
        </div>
        <div class="bg-black/30 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/20 text-right">
            <p class="text-[9px] uppercase font-black text-white/70">Intelligence</p>
            <p id="stats-score" class="text-xl font-black text-green-400">0</p>
        </div>
    </div>

    <canvas id="gameCanvas" tabindex="0"></canvas>

    <!-- Quiz Overlay -->
    <div id="quiz-overlay" class="hidden absolute inset-0 z-[150] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="w-full max-w-2xl bg-white border-8 border-green-600 rounded-[40px] p-5 md:p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-3">
                <div class="text-green-600 font-black uppercase tracking-[0.2em] text-[10px]">Intelligence Data Entry</div>
                <div id="stats-q-remaining" class="text-slate-400 text-[10px] font-bold"></div>
            </div>
            <div class="quiz-scroll-area">
                <h3 id="question-text" class="text-base md:text-xl font-black mb-4 text-slate-900 leading-tight"></h3>
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
            
            <div id="feedback-area" class="hidden mt-4 p-4 rounded-2xl border-4">
                <p id="feedback-title" class="font-black uppercase text-lg mb-1"></p>
                <p id="feedback-detail" class="text-xs text-slate-800 font-bold leading-snug"></p>
            </div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden absolute inset-0 z-[200] flex flex-col items-center justify-center p-10 text-center bg-green-700">
        <div class="mb-6 bg-white p-6 rounded-[40px] shadow-2xl border-8 border-green-900">
            <h2 id="end-status" class="text-5xl loud-font italic uppercase tracking-tighter text-green-800">Mission End</h2>
        </div>
        <div class="mb-10">
            <p class="text-white font-black uppercase tracking-widest mb-3">Final Intelligence Level</p>
            <div class="text-8xl leading-none font-black text-yellow-300" id="final-score">0</div>
        </div>
        <button id="btn-restart" class="px-16 py-6 bg-white text-green-800 loud-font rounded-full shadow-[0_10px_0_#14532d] uppercase tracking-widest text-xl transition-all active:translate-y-1 active:shadow-none border-4 border-green-900 cursor-pointer">
            REDEPLOY
        </button>
    </div>

    <!-- Mobile UI Controls -->
    <div class="mobile-controls absolute inset-0 pointer-events-none z-30">
        <div class="absolute bottom-10 left-[calc(1rem+var(--sal))] flex gap-4 pointer-events-auto">
            <div id="ctrl-left" class="control-btn w-20 h-20">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M15 19l-7-7 7-7"/></svg>
            </div>
            <div id="ctrl-right" class="control-btn w-20 h-20">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>
        <div class="absolute bottom-10 right-[calc(1rem+var(--sar))] pointer-events-auto">
            <div id="ctrl-jump" class="control-btn w-24 h-24 bg-green-600/30 border-green-600 shadow-xl">
                <div class="text-white font-black text-2xl italic">JUMP</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

const KOREAN_WAR_QUESTIONS = [
    // Easy Level
    { q: "On what date did the North Korean People's Army (NKPA) first cross the 38th parallel to invade South Korea?", a: "June 25, 1950", o: ["August 15, 1945", "June 25, 1950", "July 27, 1953", "October 1, 1949"] },
    { q: "Who was the leader of North Korea during the war?", a: "Kim Il Sung", o: ["Syngman Rhee", "Kim Il Sung", "Mao Zedong", "Ho Chi Minh"] },
    { q: "Which US General led the UN Command at the start of the war and planned the Inchon landing?", a: "Douglas MacArthur", o: ["Matthew Ridgway", "Walton Walker", "Douglas MacArthur", "Dwight D. Eisenhower"] },
    { q: "What was the code name for the daring amphibious landing at the port of Inchon?", a: "Operation Chromite", o: ["Operation Overlord", "Operation Rolling Thunder", "Operation Chromite", "Operation Rat Killer"] },
    { q: "What geographical line served as the boundary between North and South Korea before and after the war?", a: "The 38th Parallel", o: ["The Yalu River", "The 17th Parallel", "The 38th Parallel", "The Kansas Line"] },
    { q: "Which nation provided the 'People's Volunteer Army' (PVA) to support North Korea?", a: "China", o: ["The Soviet Union", "China", "Japan", "Vietnam"] },
    { q: "Who was the President of the United States at the start of the Korean War?", a: "Harry S. Truman", o: ["Franklin D. Roosevelt", "Harry S. Truman", "Dwight D. Eisenhower", "John F. Kennedy"] },
    { q: "What is the Korean War often called because it is frequently overshadowed by WWII?", a: "The Forgotten War", o: ["The Great War", "The Silent War", "The Forgotten War", "The Three-Year War"] },
    { q: "What was the name of the last defensive pocket held by UN forces in Aug 1950?", a: "The Pusan Perimeter", o: ["The Seoul Sector", "The Pusan Perimeter", "The Iron Triangle", "The Chosin Reservoir"] },
    { q: "Which US President was elected in 1952 after promising to visit Korea and end the conflict?", a: "Dwight D. Eisenhower", o: ["Richard Nixon", "Dwight D. Eisenhower", "Adlai Stevenson", "Harry Truman"] },
    { q: "Where was the final armistice agreement signed in 1953?", a: "Panmunjom", o: ["Seoul", "Pyongyang", "Panmunjom", "Kaesong"] },
    { q: "The 'Safe Conduct Passes' dropped by UN forces were known in Korean as:", a: "Ppira", o: ["Juche", "Ppira", "Hwarang", "Unam"] },
    { q: "Which country provided the most significant amount of military equipment and tanks to the North Korean Army?", a: "The Soviet Union", o: ["China", "The Soviet Union", "Japan", "Great Britain"] },
    { q: "What was the name of the primary North Korean ideology established by Kim Il Sung?", a: "Juche", o: ["Marxism", "Juche", "Maoism", "Ilminism"] },
    { q: "Approximately how many total propaganda leaflets did the US-led forces drop?", a: "2.5 billion", o: ["1 million", "100 million", "500 million", "2.5 billion"] },
    
    // Medium Level
    { q: "What was the primary focus of the US 'NSC-68' document?", a: "A massive increase in military spending to counter Soviet expansion", o: ["Immediate peace negotiations", "A massive increase in military spending to counter Soviet expansion", "A plan to rebuild the Japanese economy", "The withdrawal of troops from Europe"] },
    { q: "Why was the Soviet Union unable to veto the UN Security Council resolution to assist South Korea?", a: "They were boycotting the UN because it would not recognize communist China.", o: ["They were no longer a member of the UN.", "They were boycotting the UN because it would not recognize communist China.", "They had lost their veto power temporarily.", "They actually supported the resolution secretly."] },
    { q: "Which speech is often blamed for giving the 'green light' to the North by excluding Korea from the US defense perimeter?", a: "Dean Acheson’s National Press Club speech", o: ["The Truman Doctrine", "Dean Acheson’s National Press Club speech", "MacArthur’s speech", "The Cairo Declaration"] },
    { q: "What term refers to a conflict where superpowers support opposing sides without fighting directly?", a: "Proxy War", o: ["Civil War", "Total War", "Proxy War", "Guerrilla War"] },
    { q: "Why did China officially call its troops 'volunteers'?", a: "To avoid a formal declaration of war with the United States.", o: ["They were not paid.", "To avoid a formal declaration of war with the United States.", "Because they were all civilian farmers.", "To show they were not under Mao's control."] },
    { q: "What was the 'Lips and Teeth' theory?", a: "A Chinese security concept viewing North Korea as a critical buffer for China.", o: ["A medical theory.", "A Chinese security concept viewing North Korea as a critical buffer for China.", "A psychological warfare theme.", "A tactic for urban combat."] },
    { q: "What was the 'sticking point' that delayed the armistice for two years (1951–1953)?", a: "The repatriation of prisoners of war (POWs)", o: ["The border location", "The repatriation of prisoners of war (POWs)", "Taiwan status", "War reparations"] },
    { q: "Which battle is considered a major turning point in Feb 1951 where UN morale was restored?", a: "Chipyong-ni", o: ["Heartbreak Ridge", "Chipyong-ni", "Triangle Hill", "Pork Chop Hill"] },
    { q: "The 'Bodo League' massacre involved the execution of suspected communists by which side?", a: "South Korean forces", o: ["North Korean forces", "South Korean forces", "The Chinese Volunteer Army", "The US Marines"] },
    { q: "What was the official reason President Truman gave for firing General MacArthur?", a: "Insubordination and failure to respect civilian control of the military.", o: ["He lost the Battle of Chosin Reservoir.", "Insubordination and failure to respect civilian control of the military.", "He was too old for command.", "He refused to use nuclear weapons."] },
    { q: "Which US agency was primarily responsible for 'black' (clandestine) propaganda?", a: "The CIA", o: ["The State Department", "The FBI", "The CIA", "The Army Signal Corps"] },
    { q: "What was the goal of 'Operation Strike'?", a: "To warn civilians of imminent bombing raids so they could flee.", o: ["To encourage industrial strikes.", "To warn civilians of imminent bombing raids so they could flee.", "To launch a sudden ground assault.", "To strike the Yalu bridges."] },
    { q: "How did the death of Joseph Stalin in March 1953 affect the war?", a: "His successors encouraged North Korea and China to accept peace terms.", o: ["It caused the USSR to send more troops.", "His successors encouraged North Korea and China to accept peace terms.", "It led to a North Korean surrender.", "It resulted in a US invasion."] },
    { q: "What was the 'Pseudo-Kim Il Sung' theory used in UN propaganda?", a: "That the current leader was a fake masquerading as a hero.", o: ["That Kim was a Soviet robot.", "That the current leader was a fake masquerading as a hero.", "That Kim was secretly a capitalist.", "That Kim had already been killed."] },
    { q: "Which US general took over the Eighth Army and is credited with restoring UN fighting spirit?", a: "Matthew Ridgway", o: ["Maxwell Taylor", "James Van Fleet", "Matthew Ridgway", "Mark Clark"] },
    { q: "What was the significance of 'MiG Alley'?", a: "It was the northwestern area where jet-to-jet air combat occurred.", o: ["It was a supply route.", "It was the northwestern area where jet-to-jet air combat occurred.", "A nickname for Seoul streets.", "A propaganda leaflet theme."] },
    { q: "What was the 'Rollback' policy suggested by MacArthur?", a: "Going beyond containment to destroy the North Korean regime and reunite Korea.", o: ["Withdrawing to Pusan.", "Going beyond containment to destroy the North Korean regime and reunite Korea.", "Tank tactics.", "Budget cuts."] },
    { q: "Which battle involved US Marines breaking out of a massive encirclement in freezing temperatures?", a: "Chosin Reservoir", o: ["Inchon", "Chosin Reservoir", "Osan", "Pork Chop Hill"] },
    { q: "What was the result of 'Operation Little Switch' in April 1953?", a: "The exchange of sick and wounded prisoners.", o: ["The exchange of dead bodies.", "The exchange of sick and wounded prisoners.", "Temporary ceasefire.", "Swapping field generals."] },
    { q: "How did the Korean War impact Japan's economy?", a: "US wartime spending 'jump-started' the economy, leading to rapid growth.", o: ["It destroyed Japanese factories.", "US wartime spending 'jump-started' the economy, leading to rapid growth.", "Japan paid UN military costs.", "Japan was annexed."] },

    // Hard Level
    { q: "Under 'Operation Nightingale,' the primary psychological message to enemy soldiers was:", a: "That they would receive excellent medical care and food as POWs.", o: ["That their leaders were lying.", "That they would receive excellent medical care and food as POWs.", "That they were about to be bombed.", "That the Soviet Union had abandoned them."] },
    { q: "The '1st Radio Broadcasting and Leaflet Group' nickname was:", a: "The Ganders", o: ["The Hwarang", "The Sad Sacks", "The Ganders", "The Iron Men"] },
    { q: "Which psywar plan was designed to distract from the Communist observance of 'May Day'?", a: "Plan Mist", o: ["Plan Blizzard", "Plan Mist", "Plan Eyewash", "Plan Nutcracker"] },
    { q: "What was the mortality rate for American prisoners of war in North Korean/Chinese captivity?", a: "38%–43%", o: ["5%", "15%", "38%–43%", "70%"] },
    { q: " 'Plan Rat Killer' was a military and psychological campaign directed at:", a: "Communist guerrillas/partisans remaining in South Korea.", o: ["Enemy officers who ran away.", "Communist guerrillas/partisans remaining in South Korea.", "North Korean farmers hiding rice.", "Infected areas."] },
    { q: "The term 'Enemy Collapse Service' was the communist counterpart to the US term:", a: "Psychological Warfare", o: ["Counter-Intelligence", "Psychological Warfare", "Special Operations", "Strategic Bombing"] },
    { q: "By 1953, South Korea's money in circulation had increased by:", a: "24–42 times", o: ["2 times", "5 times", "24–42 times", "100 times"] },
    { q: "Which UN ally suffered the highest number of deaths (after the US)?", a: "The United Kingdom", o: ["Canada", "The United Kingdom", "Turkey", "Australia"] },
    { q: "What was the primary reason many Chinese and North Korean POWs refused repatriation?", a: "Many were former Nationalists or people forced into service who feared execution at home.", o: ["They were offered money.", "Many were former Nationalists or people forced into service who feared execution at home.", "Forgotten the language.", "Brainwashed."] },
    { q: "Which specific leaflet operation was designed to convince North Korean farmers to hide their crops?", a: "Plan 52/19", o: ["Plan Think", "Plan 52/19", "Plan Farmer", "Plan Harvest Moon"] },
    { q: "How did General Ridgway's preferred psychological warfare approach differ from standard theory?", a: "He advocated for showing realistic pictures of dead enemy soldiers to inspire fear.", o: ["Radio only.", "He advocated for showing realistic pictures of dead enemy soldiers to inspire fear.", "Refused to use leaflets.", "Friendly morale only."] },
    { q: "The 'Mayer Agreement' of May 1953 concerned what aspect of the war?", a: "Repayment of loans made by South Korea to UN forces.", o: ["The final border line.", "Repayment of loans made by South Korea to UN forces.", "Female prisoners.", "Soviet pilots."] },
    { q: "Which specific psywar theme used a Shakespearean name to denote distrust?", a: "Iago", o: ["Desdemona", "Iago", "Othello", "Hamlet"] },
    { q: "In Chinese propaganda, what was the primary purpose of the 'War Song of the PVA'?", a: "To mobilize the masses, boost morale, and normalize hardships of war.", o: ["To coordinate secret attacks.", "To mobilize the masses, boost morale, and normalize hardships of war.", "To mock leaders.", "To signal a retreat."] },
    { q: "What was 'Operation Glory'?", a: "The exchange of deceased combatants' remains after the armistice.", o: ["The final offensive.", "The exchange of deceased combatants' remains after the armistice.", "The Inchon nickname.", "A plan to drop gold."] }
];

let auth, db, appId;
let firebaseEnabled = false;

try {
    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        appId = typeof __app_id !== 'undefined' ? __app_id : 'korean-war-mastery-rev';
        firebaseEnabled = true;
    }
} catch (e) {
    console.error("Cloud tracking unavailable.");
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = {
    gameStarted: false,
    gameActive: false,
    paused: false,
    timer: 300,
    lives: 5,
    score: 0,
    viewportW: window.innerWidth,
    viewportH: window.innerHeight,
    groundY: 0,
    cameraX: 0,
    user: null
};

const player = { 
    x: 200, y: 0, w: 44, h: 66,
    vx: 0, vy: 0, 
    speed: 8, jumpPower: -20, 
    grounded: false, facingRight: true,
    jumpsAvailable: 2,
    frame: 0
};

let sessionDeck = [];
let blocks = [];
const inputs = { left: false, right: false };

function shuffle(a) {
    let array = [...a];
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function initTracking() {
    if (!firebaseEnabled) return;
    const analyticsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'usage', 'stats');

    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };
    
    await initAuth();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            state.user = user;
            onSnapshot(analyticsDoc, (snapshot) => {
                if (snapshot.exists()) {
                    const count = snapshot.data().playCount || 0;
                    document.getElementById('global-play-count').innerText = count.toLocaleString();
                    document.getElementById('play-tracker').style.opacity = '1';
                } else {
                    setDoc(analyticsDoc, { playCount: 0 });
                }
            }, (err) => console.log("Tracking restricted"));
        }
    });
}

async function recordDeployment() {
    if (!firebaseEnabled || !state.user) return;
    const analyticsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'usage', 'stats');
    try {
        await updateDoc(analyticsDoc, { playCount: increment(1) });
    } catch (e) {
        await setDoc(analyticsDoc, { playCount: 1 }, { merge: true });
    }
}

function initBlocks() {
    blocks = [];
    for (let i = 0; i < 80; i++) {
        blocks.push({
            x: 800 + (i * 600),
            y: state.groundY - 240 - (Math.random() * 120),
            w: 80, h: 80,
            active: true,
            type: 'quiz'
        });
        if (Math.random() > 0.4) {
            blocks.push({
                x: 1100 + (i * 600),
                y: state.groundY - 140,
                w: 80, h: 80,
                active: true,
                type: 'brick'
            });
        }
    }
}

function resize() {
    state.viewportW = window.innerWidth;
    state.viewportH = window.innerHeight;
    canvas.width = state.viewportW;
    canvas.height = state.viewportH;
    state.groundY = state.viewportH - 100;
    
    if (!state.gameStarted) {
        player.y = state.groundY - player.h;
        initBlocks();
    }
}

function handleJump() {
    if (!state.gameActive || state.paused) return;
    if (player.jumpsAvailable > 0) {
        player.vy = player.jumpPower;
        player.jumpsAvailable--;
        player.grounded = false;
    }
}

function init() {
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));
    resize();
    initTracking();

    sessionDeck = shuffle([...KOREAN_WAR_QUESTIONS]);

    const handleKey = (e, isDown) => {
        if (!state.gameActive || state.paused) return;
        const code = e.code;
        if (code === 'ArrowLeft' || code === 'KeyA') { e.preventDefault(); inputs.left = isDown; }
        if (code === 'ArrowRight' || code === 'KeyD') { e.preventDefault(); inputs.right = isDown; }
        if (isDown && (code === 'Space' || code === 'KeyW' || code === 'ArrowUp')) {
            e.preventDefault();
            handleJump();
        }
    };
    window.addEventListener('keydown', (e) => handleKey(e, true));
    window.addEventListener('keyup', (e) => handleKey(e, false));

    canvas.addEventListener('mousedown', () => { canvas.focus(); });

    const setupTouch = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[key] = true; }, { passive: false });
        el.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; }, { passive: false });
    };
    setupTouch('ctrl-left', 'left');
    setupTouch('ctrl-right', 'right');
    document.getElementById('ctrl-jump').addEventListener('touchstart', (e) => { e.preventDefault(); handleJump(); }, { passive: false });

    document.getElementById('btn-start').onclick = () => {
        if (firebaseEnabled) recordDeployment();
        document.getElementById('start-screen').classList.add('hidden');
        state.gameStarted = true;
        state.gameActive = true;
        canvas.focus();
        window.focus();
    };

    document.getElementById('btn-restart').onclick = () => location.reload();
    requestAnimationFrame(update);
}

function triggerQuiz() {
    if (state.paused) return;
    state.paused = true;
    const q = sessionDeck[0];
    const modal = document.getElementById('quiz-overlay');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('feedback-area');
    
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('stats-q-remaining').innerText = `${sessionDeck.length} UNITS REMAINING`;
    document.getElementById('stats-q-remaining-top').innerText = `${sessionDeck.length} DATA REQUISITIONS LEFT`;
    feedback.classList.add('hidden');
    container.classList.remove('hidden');
    container.innerHTML = '';
    
    // Randomize choice order every time
    const choices = shuffle([...q.o]);
    
    choices.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; 
        btn.innerText = opt;
        btn.onclick = () => {
            const btns = Array.from(container.children);
            btns.forEach(b => b.disabled = true);
            
            if (opt === q.a) {
                btn.classList.add('correct-flash');
                state.score += 1000;
                document.getElementById('stats-score').innerText = state.score;
                sessionDeck.shift();
                
                feedback.classList.remove('hidden');
                container.classList.add('hidden');
                feedback.className = "mt-4 p-4 rounded-[20px] border-4 border-green-500 bg-green-50";
                document.getElementById('feedback-title').innerText = "VERIFIED";
                document.getElementById('feedback-title').className = "font-black uppercase text-lg mb-1 text-green-600";
                document.getElementById('feedback-detail').innerText = "Intelligence entry correct. Movement restored.";

                if (sessionDeck.length === 0) {
                    setTimeout(() => endGame(true), 1200);
                } else {
                    setTimeout(() => resume(), 1200);
                }
            } else {
                btn.classList.add('wrong-flash');
                btns.forEach(b => { if(b.innerText === q.a) b.classList.add('correct-flash'); });
                state.lives--;
                updateLivesHUD();
                feedback.classList.remove('hidden');
                container.classList.add('hidden');
                feedback.className = "mt-4 p-4 rounded-[20px] border-4 border-red-500 bg-red-50";
                document.getElementById('feedback-title').innerText = "CORRUPTED";
                document.getElementById('feedback-title').className = "font-black uppercase text-lg mb-1 text-red-600";
                document.getElementById('feedback-detail').innerText = `Correction: ${q.a}. Re-queueing mission.`;
                
                const missedQ = sessionDeck.shift();
                sessionDeck.splice(Math.min(3, sessionDeck.length), 0, missedQ); 
                
                setTimeout(() => {
                    if (state.lives <= 0) endGame(false);
                    else resume();
                }, 2500);
            }
        };
        container.appendChild(btn);
    });
    modal.classList.remove('hidden');
}

function updateLivesHUD() {
    document.getElementById('stats-lives').innerText = '❤️'.repeat(Math.max(0, state.lives)) + '🖤'.repeat(Math.max(0, 5 - state.lives));
}

function resume() {
    document.getElementById('quiz-overlay').classList.add('hidden');
    state.paused = false;
    canvas.focus();
}

function update() {
    if (state.gameStarted && state.gameActive && !state.paused) {
        if (inputs.right) { player.vx = player.speed; player.facingRight = true; player.frame += 0.25; }
        else if (inputs.left) { player.vx = -player.speed; player.facingRight = false; player.frame += 0.25; }
        else { player.vx *= 0.85; player.frame = 0; }
        player.vy += 1.0; 
        player.x += player.vx;
        player.y += player.vy;
        if (player.y + player.h > state.groundY) { 
            player.y = state.groundY - player.h;
            player.vy = 0; 
            player.grounded = true;
            player.jumpsAvailable = 2;
        }
        blocks.forEach(b => {
            if (!b.active && b.type === 'quiz') return;
            if (player.x < b.x + b.w && player.x + player.w > b.x && 
                player.y < b.y + b.h && player.y + player.h > b.y) {
                if (player.vy < 0 && player.y > b.y + b.h - 35) {
                    player.vy = 5;
                    if (b.type === 'quiz' && b.active) {
                        b.active = false;
                        triggerQuiz();
                    }
                } 
                else if (player.vy > 0 && player.y + player.h < b.y + 35) {
                    player.y = b.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                    player.jumpsAvailable = 2;
                }
                else if (player.vx > 0 && player.x + player.w < b.x + 25) { player.x = b.x - player.w; }
                else if (player.vx < 0 && player.x > b.x + b.w - 25) { player.x = b.x + b.w; }
            }
        });
        if (player.x < 0) player.x = 0;
        let targetCamX = -player.x + (state.viewportW * 0.25);
        state.cameraX += (targetCamX - state.cameraX) * 0.15;
        if (state.cameraX > 0) state.cameraX = 0;
    }
    render();
    requestAnimationFrame(update);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#5c94fc";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    for(let i=0; i<15; i++) {
        ctx.beginPath(); ctx.ellipse(400 + i*900, 180, 100, 50, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.save();
    ctx.translate(state.cameraX, 0);
    ctx.fillStyle = "#16a34a"; ctx.fillRect(-5000, state.groundY, 80000, 30);
    ctx.fillStyle = "#5c4033"; ctx.fillRect(-5000, state.groundY + 30, 80000, 150);
    blocks.forEach(b => { 
        if (!b.active && b.type === 'quiz') {
            ctx.fillStyle = '#6b7280'; ctx.beginPath(); 
            if (ctx.roundRect) ctx.roundRect(b.x, b.y, b.w, b.h, 12);
            else ctx.rect(b.x, b.y, b.w, b.h);
            ctx.fill();
            return;
        }
        if (b.type === 'quiz') {
            ctx.fillStyle = '#fbbf24'; ctx.beginPath(); 
            if (ctx.roundRect) ctx.roundRect(b.x, b.y, b.w, b.h, 12);
            else ctx.rect(b.x, b.y, b.w, b.h);
            ctx.fill();
            ctx.fillStyle = '#0f172a'; ctx.font = 'black 50px Inter'; ctx.textAlign = 'center';
            ctx.fillText('?', b.x + b.w/2, b.y + b.h/2 + 18);
        } else {
            ctx.fillStyle = '#15803d'; ctx.beginPath(); 
            if (ctx.roundRect) ctx.roundRect(b.x, b.y, b.w, b.h, 6);
            else ctx.rect(b.x, b.y, b.w, b.h);
            ctx.fill();
        }
    });
    ctx.save();
    ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
    if (!player.facingRight) ctx.scale(-1, 1);
    const bounce = Math.sin(player.frame * 2) * 6;
    ctx.fillStyle = "#4b2c20"; ctx.fillRect(-18, -40 + bounce, 36, 20);
    ctx.fillStyle = "#ffdbac"; ctx.fillRect(-18, -20 + bounce, 36, 30);
    ctx.fillStyle = "#000"; ctx.fillRect(8, -12 + bounce, 5, 5);
    ctx.fillStyle = "#16a34a"; ctx.fillRect(-20, 10 + bounce, 40, 30);
    ctx.fillStyle = "#1e3a8a"; ctx.fillRect(-20, 25 + bounce, 40, 15);
    ctx.fillRect(-20, 40, 16, 18); ctx.fillRect(4, 40, 16, 18);
    ctx.restore();
    ctx.restore();
}

function endGame(victory) {
    state.gameActive = false;
    document.getElementById('end-status').innerText = victory ? "MISSION ACCOMPLISHED" : "UNIT DEFEATED";
    document.getElementById('final-score').innerText = state.score;
    document.getElementById('end-screen').classList.remove('hidden');
}

setInterval(() => {
    if (state.gameActive && !state.paused && state.timer > 0) {
        state.timer--;
        document.getElementById('stats-timer').innerText = state.timer + "s";
        if (state.timer <= 0) endGame(false);
    }
}, 1000);

if (document.readyState === 'complete' || document.readyState === 'interactive') {
    init();
} else {
    window.addEventListener('load', init);
}
</script>
