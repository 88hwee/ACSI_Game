<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alien Intelligence: Korean War Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
            --sar: env(safe-area-inset-right);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background: #020617; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            color: white; 
            touch-action: none; 
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }

        .loud-font { font-family: 'Black Ops One', cursive; }
        
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at 50% 100%, #064e3b 0%, #020617 70%);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .control-btn {
            background: rgba(34, 197, 94, 0.15);
            border: 2px solid rgba(34, 197, 94, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .control-btn:active { background: rgba(34, 197, 94, 0.4); transform: scale(0.92); }

        .option-btn {
            transition: all 0.2s;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            padding: 0.6rem 1.2rem;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            background: #1e293b;
            border: 2px solid #334155;
            color: #fff;
            text-transform: uppercase;
        }

        #hud {
            padding-top: calc(0.5rem + var(--sat));
            padding-left: calc(1rem + var(--sal));
            padding-right: calc(1rem + var(--sar));
        }

        @media (orientation: portrait) {
            #portrait-warning { display: flex !important; }
        }

        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body>

<div id="portrait-warning" class="hidden fixed inset-0 z-[1000] bg-slate-950 flex flex-col items-center justify-center p-10 text-center">
    <div class="animate-bounce mb-4 text-green-500">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v16a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2H6a2 2 0 00-2 2zM9 20h6"/></svg>
    </div>
    <h2 class="text-2xl loud-font text-green-400 mb-2 uppercase">Rotate for Landscape</h2>
    <p class="text-slate-500 text-sm">Deployment optimized for Wide Combat Mode.</p>
</div>

<div id="game-container">
    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-50 bg-slate-950/95 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl md:text-8xl font-black text-green-600 loud-font italic mb-2 tracking-tighter uppercase leading-tight">Korean War</h1>
        <p class="text-green-400 font-bold text-xs tracking-widest mb-10 uppercase">Mastery Quest: Tactical Shooter</p>
        <button id="btn-start" class="px-16 py-5 bg-green-600 text-white loud-font rounded-full shadow-2xl uppercase tracking-widest text-xl active:scale-95 transition-transform border-b-4 border-green-800">
            Begin Deployment
        </button>
    </div>

    <!-- HUD -->
    <div id="hud" class="absolute top-0 left-0 w-full flex justify-between items-start pointer-events-none z-20">
        <div class="bg-green-900/40 backdrop-blur-md px-4 py-2 rounded-xl border border-green-500/30 text-center">
            <p class="text-[9px] uppercase font-black text-green-400">Score</p>
            <p id="stats-coins" class="text-lg font-black text-white">0</p>
        </div>
        <div class="bg-green-900/40 backdrop-blur-md px-6 py-2 rounded-xl border border-green-500/30 text-center">
            <p class="text-[9px] uppercase font-black text-green-400">Time</p>
            <p id="stats-timer" class="text-lg font-black text-white">300s</p>
        </div>
        <div class="bg-green-900/40 backdrop-blur-md px-4 py-2 rounded-xl border border-green-500/30 text-center">
            <p class="text-[9px] uppercase font-black text-green-400">Intel Left</p>
            <p id="stats-q" class="text-lg font-black text-white">0</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- MCQ Modal -->
    <div id="quiz-overlay" class="hidden absolute inset-0 z-[100] flex items-center justify-center bg-slate-950/98 p-4 backdrop-blur-md">
        <div class="w-full max-w-3xl bg-slate-900 border-t-[8px] border-green-600 rounded-b-3xl p-6 shadow-2xl max-h-[92vh] overflow-y-auto">
            <div class="text-green-500 font-black uppercase tracking-[0.2em] text-[10px] mb-2">Tactical Intelligence Decryption</div>
            <h3 id="question-text" class="text-xl font-black italic uppercase mb-6 text-white leading-tight"></h3>
            <div id="options-container" class="grid grid-cols-2 gap-3"></div>
            <div id="feedback" class="mt-4 text-center font-black h-8 uppercase italic text-lg"></div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden absolute inset-0 z-[200] flex flex-col items-center justify-center bg-slate-950/98 p-8 text-center">
        <h1 class="text-6xl loud-font italic text-green-600 mb-6 uppercase">Mission End</h1>
        <div class="mb-10">
            <p class="text-slate-500 text-xs uppercase font-black tracking-widest mb-1">Intelligence Scored</p>
            <div class="text-7xl font-black text-white" id="final-score">0</div>
        </div>
        <button id="btn-restart" class="px-16 py-6 bg-white text-black loud-font rounded-full active:bg-green-600 active:text-white transition-all uppercase tracking-widest text-xl shadow-2xl">
            Restart Unit
        </button>
    </div>

    <!-- Controls -->
    <div class="absolute bottom-[calc(1.5rem+var(--sab))] left-[calc(1.5rem+var(--sal))] flex gap-4 z-30 pointer-events-none">
        <div id="ctrl-left" class="control-btn w-20 h-20 pointer-events-auto">
            <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M15 19l-7-7 7-7"/></svg>
        </div>
        <div id="ctrl-right" class="control-btn w-20 h-20 pointer-events-auto">
            <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M9 5l7 7-7 7"/></svg>
        </div>
    </div>
    <div class="absolute bottom-[calc(1.5rem+var(--sab))] right-[calc(1.5rem+var(--sar))] z-30 pointer-events-none">
        <div id="ctrl-shoot" class="control-btn w-24 h-24 bg-red-600/20 border-red-600/40 pointer-events-auto">
            <div class="w-10 h-10 rounded-full bg-red-600 animate-pulse"></div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = {
    gameStarted: false,
    gameActive: false,
    paused: false,
    timer: 300,
    score: 0,
    viewportW: window.innerWidth,
    viewportH: window.innerHeight,
    particles: [],
    bullets: [],
    enemies: [],
    lastSpawn: 0
};

// 2x size for mobile landscape visibility
const player = { x: 0, w: 120, h: 80, speed: 12 };

const questionsDeck = [
    { q: "On what date did the conventional phase of the Korean War begin?", a: "June 25, 1950", o: ["August 15, 1945", "June 25, 1950", "July 27, 1953", "October 1, 1949"] },
    { q: "What was the primary geographical dividing line between North and South Korea in 1945?", a: "The 38th Parallel", o: ["The Yalu River", "The Han River", "The 38th Parallel", "The Pusan Perimeter"] },
    { q: "Why is the Korean War often characterized as a 'civil war'?", a: "It was a conflict between two regimes claiming to be the sole legitimate government.", o: ["It only involved soldiers from one ethnic group.", "It was a conflict between two regimes claiming to be the sole legitimate government.", "It did not involve any foreign weaponry.", "It was fought entirely without international assistance."] },
    { q: "How is the Korean War defined as a 'proxy war'?", a: "Superpowers supported opposing sides but did not fight each other directly.", o: ["It was fought by robots.", "It was a war where local leaders had no power.", "Superpowers supported opposing sides but did not fight each other directly.", "It was fought entirely through economic sanctions."] },
    { q: "Before June 1950, what internal events suggested the war was already a civil conflict?", a: "Widespread insurgencies and significant border clashes resulted in ~100,000 deaths.", o: ["There were no issues before 1950.", "Widespread insurgencies and significant border clashes resulted in ~100,000 deaths.", "North and South Korea had signed a peace treaty.", "The UN had successfully unified the country."] },
    { q: "What was the central U.S. foreign policy goal during the Korean War?", a: "Containment", o: ["Expansionism", "Containment", "Isolationism", "Imperialism"] },
    { q: "How did President Truman officially describe the military intervention to avoid a formal declaration of war?", a: "A 'police action'", o: ["A total war", "A 'police action'", "An invasion", "A liberation mission"] },
    { q: "What was the 'Domino Theory' in the context of the U.S. intervention?", a: "The belief that if South Korea fell, neighboring countries like Japan would follow.", o: ["A strategy involving game pieces.", "The belief that if South Korea fell, neighboring countries like Japan would follow.", "The idea that all wars start with a single incident.", "A plan to drop leaflets shaped like dominoes."] },
    { q: "Which document advocated for a massive buildup of U.S. military power to counter the Soviet threat?", a: "NSC-68", o: ["The Truman Doctrine", "The Cairo Declaration", "NSC-68", "The Marshall Plan"] },
    { q: "The United States provided approximately what percentage of the UN military personnel?", a: "90%", o: ["50%", "90%", "10%", "100%"] },
    { q: "Who was the chosen leader of the Soviet-backed 'client state' in North Korea?", a: "Kim Il Sung", o: ["Syngman Rhee", "Mao Zedong", "Kim Il Sung", "Peng Dehuai"] },
    { q: "Why was the Soviet Union unable to veto the UN Security Council resolution to assist South Korea?", a: "They were boycotting the UN because it refused to recognize the PRC.", o: ["They had lost their veto power.", "They were boycotting the UN because it refused to recognize the PRC.", "They actually supported the resolution.", "They were not members of the UN at the time."] },
    { q: "What was Stalin’s primary strategic priority in the late 1940s?", a: "Creating a buffer zone of communist states in Eastern Europe.", o: ["Dominating South America.", "Creating a buffer zone of communist states in Eastern Europe.", "Starting a war with the U.S. in Japan.", "Disbanding the Red Army."] },
    { q: "When did Stalin finally give Kim Il Sung the 'green light' to invade?", a: "Late January 1950", o: ["1945", "Late January 1950", "After Inchon", "1953"] },
    { q: "What did Stalin warn Kim would happen if the invasion backfired?", a: "'I shall not lift a finger' to help directly.", o: ["He would send the entire Soviet Army.", "'I shall not lift a finger' to help directly.", "He would surrender to the U.S.", "He would use nuclear weapons."] },
    { q: "What phrase did Premier Zhou Enlai use to describe the security relationship between China and Korea?", a: "As closely related as lips and teeth", o: ["Brothers in arms", "As closely related as lips and teeth", "One nation, one goal", "The Great Wall of Communism"] },
    { q: "Under what name did China constitute its forces to avoid an official war with the U.S.?", a: "The People's Volunteer Army (PVA)", o: ["The Red Army", "The People's Liberation Army", "The People's Volunteer Army (PVA)", "The Northeastern Border Defense Army"] },
    { q: "Why was Mao Zedong initially reluctant to intervene?", a: "He wanted to focus on domestic reconstruction and 'liberating' Taiwan.", o: ["He was a pacifist.", "He wanted to focus on domestic reconstruction and 'liberating' Taiwan.", "He did not like Kim Il Sung.", "He thought the U.S. was his ally."] },
    { q: "What triggered the massive Chinese intervention in late 1950?", a: "UNC forces crossing the 38th parallel and advancing toward the Yalu River.", o: ["The death of Stalin.", "UNC forces crossing the 38th parallel and advancing toward the Yalu River.", "A formal declaration of war by Rhee.", "The start of the Inchon landing."] },
    { q: "What tactic did the PVA use to mitigate the UN's superior air and firepower?", a: "Night fighting, camouflage, and marching 'dark-to-dark.'", o: ["Building massive bunkers.", "Night fighting, camouflage, and marching 'dark-to-dark.'", "Using heavy tanks in broad daylight.", "Retreating whenever they saw a plane."] },
    { q: "What was Syngman Rhee’s stance on a peaceful armistice?", a: "He strongly opposed it, wishing to reunite the peninsula by force.", o: ["He was the lead negotiator.", "He strongly opposed it, wishing to reunite the peninsula by force.", "He suggested it first.", "He didn't care about the outcome."] },
    { q: "What was the 'Bodo League' in South Korea?", a: "A re-education movement for suspected sympathizers who were later executed.", o: ["A professional baseball organization.", "A re-education movement for suspected sympathizers who were later executed.", "A group of military advisors.", "Rhee's cabinet members."] },
    { q: "Kim Il Sung based his confidence for a quick victory on which assumption?", a: "A popular uprising against Rhee would occur in the South.", o: ["The South had no soldiers.", "A popular uprising against Rhee would occur in the South.", "Stalin would send nuclear bombs.", "He had 10 million tanks."] },
    { q: "Which state ideology did Kim Il Sung establish emphasizing self-reliance?", a: "Juche", o: ["Marxism-Leninism", "Juche", "Maoism", "Capitalism"] },
    { q: "Before the war, why was the ROK Army poorly equipped compared to the KPA?", a: "The U.S. withheld heavy weaponry to prevent Rhee from attacking the North.", o: ["They had no money.", "The U.S. withheld heavy weaponry to prevent Rhee from attacking the North.", "Rhee preferred a light infantry approach.", "They had sold all their equipment to China."] },
    { q: "What was the daring amphibious assault planned by MacArthur to break the Pusan stalemate?", a: "Operation Chromite (The Inchon Landing)", o: ["The Yalu River Crossing", "Operation Chromite (The Inchon Landing)", "Operation Thunderbolt", "The Chosin Reservoir breakout"] },
    { q: "What did MacArthur’s 'rollback' policy represent as a shift from original goals?", a: "Moving beyond containment to destroy the DPRK and reunite Korea.", o: ["Returning all troops home immediately.", "Moving beyond containment to destroy the DPRK and reunite Korea.", "Rolling tanks backward into defensive positions.", "Ending the war through economic trade."] },
    { q: "In which location did MacArthur famously meet President Truman to assure him China would not intervene?", a: "Wake Island", o: ["The White House", "Wake Island", "Tokyo", "Panmunjom"] },
    { q: "What was MacArthur’s suggested strategy to deal with the massive Chinese intervention?", a: "Extending the war into China, naval blockade and nuclear weapons.", o: ["Total withdrawal.", "Extending the war into China, naval blockade and nuclear weapons.", "Asking for UN mediation.", "Surrendering immediately."] },
    { q: "What was the official reason President Truman gave for firing General MacArthur?", a: "Insubordination and violation of civilian control over the military.", o: ["Losing too many battles.", "Insubordination and violation of civilian control over the military.", "Old age.", "Taking too many vacations in Japan."] },
    { q: "What was the 'Pusan Perimeter'?", a: "The last line of defense in the southeastern tip of Korea.", o: ["A new type of tank.", "The last line of defense in the southeastern tip of Korea.", "A strategy to drop billions of leaflets.", "The border with Manchuria."] },
    { q: "The 'Chosin Few' refers to soldiers from which battle?", a: "Chosin Reservoir", o: ["Inchon", "Chosin Reservoir", "Triangle Hill", "Heartbreak Ridge"] },
    { q: "What became the biggest 'sticking point' in peace negotiations after July 1951?", a: "The repatriation of prisoners of war (POWs).", o: ["The location of the capital.", "The repatriation of prisoners of war (POWs).", "The use of the Korean language.", "Food supplies for civilians."] },
    { q: "Why did many Chinese and North Korean POWs refuse to return home?", a: "Fear of punishment for being captured or for political views.", o: ["Better jobs in the U.S.", "Fear of punishment for being captured or for political views.", "They had forgotten where they lived.", "They were 'brainwashed' by American movies."] },
    { q: "The term 'MiG Alley' refers to what aspect of the war?", a: "Northwestern North Korea where jet air combat frequently occurred.", o: ["A bowling alley in Pusan.", "Northwestern North Korea where jet air combat frequently occurred.", "A street in Seoul.", "A supply route for North Korean tanks."] },
    { q: "Approximately how many propaganda leaflets were dropped by UN forces during the war?", a: "2.5 billion", o: ["1 million", "100 million", "2.5 billion", "50 billion"] },
    { q: "What was the primary goal of 'Operation Strike'?", a: "To warn civilians of imminent bombing raids to flee and clog roads.", o: ["To encourage strikes in factories.", "To warn civilians of imminent bombing raids to flee and clog roads.", "To strike down the enemy flag.", "To find a new way to land in Inchon."] },
    { q: "What was the 'Pseudo-Kim Il Sung' theory spread by U.S. propaganda?", a: "That the current Kim was a fake 'Kim Sung Ju' masquerading as a hero.", o: ["That Kim was a robot.", "That the current Kim was a fake 'Kim Sung Ju' masquerading as a hero.", "That Kim was actually a capitalist.", "That Kim was an American spy."] },
    { q: "What was the 'War Song of the Chinese People’s Volunteer Army' used for?", a: "To mobilize the masses, boost morale, and normalize hardships.", o: ["To mock the soldiers.", "To mobilize the masses, boost morale, and normalize hardships.", "To coordinate secret attacks through lyrics.", "To beg for food."] },
    { q: "How did the U.S. try to overcome the high illiteracy rate among enemy troops?", a: "Using cartoon-based leaflets like 'Sad Sack'.", o: ["By sending teachers to the front lines.", "Using cartoon-based leaflets like 'Sad Sack'.", "Dropping books from planes.", "Only broadcasting through loudspeakers."] },
    { q: "Who succeeded Truman and was elected in 1952 with a promise to end the war?", a: "Dwight D. Eisenhower", o: ["Richard Nixon", "Dwight D. Eisenhower", "John F. Kennedy", "Lyndon B. Johnson"] },
    { q: "What major event in March 1953 shifted the Soviet position toward ending the war?", a: "The death of Joseph Stalin.", o: ["The invention of the hydrogen bomb.", "The death of Joseph Stalin.", "The capture of Moscow by the U.S.", "A massive drought in Russia."] },
    { q: "Where was the Korean Armistice Agreement signed?", a: "Panmunjom", o: ["Seoul", "Pyongyang", "Panmunjom", "Tokyo"] },
    { q: "What is the name of the buffer zone created by the armistice?", a: "The Demilitarized Zone (DMZ)", o: ["The No-Man's Land", "The Demilitarized Zone (DMZ)", "The Iron Curtain", "The Bamboo Curtain"] },
    { q: "Was a formal peace treaty signed to officially end the war?", a: "No, technically North and South Korea remain in a state of war.", o: ["Yes, in 1953.", "No, technically North and South Korea remain in a state of war.", "Yes, but only by the U.S. and China.", "No, the UN vetoed it."] },
    { q: "What was one of the first results of the armistice regarding deceased soldiers?", a: "Operation Glory, an exchange of dead bodies.", o: ["They were left in the fields.", "Operation Glory, an exchange of dead bodies.", "A mass burial in the DMZ.", "Building a giant shared monument."] },
    { q: "How did the war affect the U.S. defense budget in the long term?", a: "Tripling of armed forces and doubling of the Pentagon budget.", o: ["It led to permanent budget cuts.", "Tripling of armed forces and doubling of the Pentagon budget.", "It had no effect.", "The budget was moved entirely to the State Department."] },
    { q: "What was the 'Lips and Teeth' theory’s eventual consequence for the PRC?", a: "North Korea became a permanent security buffer for China.", o: ["They lost all their heavy industry.", "North Korea became a permanent security buffer for China.", "China became a part of North Korea.", "The theory was proven wrong by an invasion."] },
    { q: "How did the war impact Japan’s economy?", a: "U.S. wartime spending 'jump-started' the economy.", o: ["It destroyed Japanese factories.", "U.S. wartime spending 'jump-started' the economy.", "Japan was forced to pay for the war.", "Japan became an agricultural society."] },
    { q: "Why is the Korean War often called 'The Forgotten War'?", a: "It was overshadowed by World War II and the Vietnam War.", o: ["Everyone actually forgot it happened.", "It was overshadowed by World War II and the Vietnam War.", "It was too short to be remembered.", "The U.S. government burned all records of it."] }
];

let sessionDeck = [];
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function buildSessionDeck() {
    let deck = shuffle([...questionsDeck]);
    return deck;
}
sessionDeck = buildSessionDeck();

function resize() {
    state.viewportW = window.innerWidth;
    state.viewportH = window.innerHeight;
    canvas.width = state.viewportW;
    canvas.height = state.viewportH;
    player.x = state.viewportW / 2 - player.w / 2;
}

const touch = { left: false, right: false };
function init() {
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    resize();
    
    document.getElementById('btn-start').onclick = () => {
        document.getElementById('start-screen').classList.add('hidden');
        state.gameStarted = true; state.gameActive = true;
    };
    document.getElementById('btn-restart').onclick = () => location.reload();

    const setupTouch = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); touch[key] = true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); touch[key] = false; });
        el.addEventListener('touchcancel', (e) => { e.preventDefault(); touch[key] = false; });
    };
    setupTouch('ctrl-left', 'left');
    setupTouch('ctrl-right', 'right');
    document.getElementById('ctrl-shoot').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.gameActive && !state.paused) shoot();
    });

    requestAnimationFrame(update);
}

function shoot() {
    // Spawns from front of ship (elevated for visibility)
    state.bullets.push({ x: player.x + player.w/2 - 4, y: state.viewportH - 120, r: 10, speed: 14 });
}

function spawnEnemy() {
    const r = 32;
    state.enemies.push({
        x: Math.random() * (state.viewportW - r*2) + r,
        y: -r,
        r: r,
        speed: 2 + Math.random() * 2,
        type: 'mcq'
    });
}

function createFireworks(x, y) {
    const colors = ['#22c55e', '#fbbf24', '#3b82f6', '#ef4444', '#ffffff'];
    for (let i = 0; i < 60; i++) {
        state.particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 16,
            vy: (Math.random() - 0.5) * 16,
            life: 1.0,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 5 + 2
        });
    }
}

function triggerQuiz() {
    state.paused = true;
    const q = sessionDeck[0];
    const modal = document.getElementById('quiz-overlay');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('stats-q').innerText = sessionDeck.length;
    container.innerHTML = '';
    feedback.innerText = '';
    
    shuffle([...q.o]).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => {
            Array.from(container.children).forEach(b => b.disabled = true);
            if (opt === q.a) {
                // Correct: Celebration + Instant Resume
                state.score += 50;
                document.getElementById('stats-coins').innerText = `Score: ${state.score}`;
                createFireworks(state.viewportW / 2, state.viewportH / 2);
                sessionDeck.shift();
                if (sessionDeck.length === 0) endGame();
                else resume();
            } else {
                // Wrong: Show answer, re-queue 3 positions later
                btn.classList.add('wrong');
                feedback.innerText = `Incorrect. Intel Point: ${q.a}`;
                feedback.className = "mt-4 text-center font-black uppercase italic text-red-500 text-lg";
                
                const missed = sessionDeck.shift();
                // Reinforcement: Repeat 3 questions later
                const targetPos = Math.min(3, sessionDeck.length);
                sessionDeck.splice(targetPos, 0, missed);
                
                setTimeout(() => {
                    resume();
                }, 2200);
            }
        };
        container.appendChild(btn);
    });
    modal.classList.remove('hidden');
}

function resume() {
    document.getElementById('quiz-overlay').classList.add('hidden');
    state.paused = false;
}

function update() {
    if (!state.gameStarted) { requestAnimationFrame(update); return; }

    if (!state.paused) {
        if (touch.left && player.x > 0) player.x -= player.speed;
        if (touch.right && player.x < state.viewportW - player.w) player.x += player.speed;

        if (Date.now() - state.lastSpawn > 2200) {
            spawnEnemy();
            state.lastSpawn = Date.now();
        }

        for (let i = state.bullets.length - 1; i >= 0; i--) {
            const b = state.bullets[i];
            b.y -= b.speed;
            if (b.y < -20) state.bullets.splice(i, 1);
        }

        for (let i = state.enemies.length - 1; i >= 0; i--) {
            const en = state.enemies[i];
            en.y += en.speed;
            if (en.y > state.viewportH + en.r) {
                state.enemies.splice(i, 1);
                continue;
            }

            for (let j = state.bullets.length - 1; j >= 0; j--) {
                const b = state.bullets[j];
                const dist = Math.hypot(b.x - en.x, b.y - en.y);
                if (dist < en.r + 20) {
                    state.bullets.splice(j, 1);
                    state.enemies.splice(i, 1);
                    triggerQuiz();
                    break;
                }
            }
        }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.025;
        if (p.life <= 0) state.particles.splice(i, 1);
    }

    if (state.gameActive && !state.paused) {
        // Simple timer logic handled in interval
    }

    render();
    requestAnimationFrame(update);
}

function render() {
    ctx.clearRect(0, 0, state.viewportW, state.viewportH);
    
    // Distant stars/snow
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    for(let i=0; i<30; i++) {
        ctx.fillRect((Date.now()/70 + i*167) % state.viewportW, (i*193) % state.viewportH, 2, 2);
    }

    // Mountains (Atmosphere)
    ctx.fillStyle = "#1e293b";
    for(let i=0; i<5; i++) {
        ctx.beginPath();
        ctx.moveTo(i * state.viewportW/4 - 100, state.viewportH);
        ctx.lineTo(i * state.viewportW/4 + state.viewportW/8, state.viewportH - 100);
        ctx.lineTo(i * state.viewportW/4 + state.viewportW/4 + 100, state.viewportH);
        ctx.fill();
    }

    // Player Ship (Landscape Optimized)
    ctx.fillStyle = "#16a34a"; // Military Green
    // Base: Positioned high to clear controls
    ctx.fillRect(player.x, state.viewportH - 100, player.w, 35);
    ctx.fillStyle = "#15803d";
    // Turret
    ctx.fillRect(player.x + (player.w * 0.3), state.viewportH - 120, player.w * 0.4, 20);

    // Intelligence Crates (Enemies)
    state.enemies.forEach(en => {
        ctx.beginPath();
        ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2);
        ctx.fillStyle = "#475569"; // Slate gray crate
        ctx.fill();
        ctx.strokeStyle = "#22c55e"; // Green Intel Glow
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 24px Inter";
        ctx.textAlign = "center";
        ctx.fillText("?", en.x, en.y + 8);
    });

    // Bullets (Energy Bolts)
    ctx.fillStyle = "#fbbf24";
    state.bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, 10, 26);
    });

    // Celebration Fireworks
    state.particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;
}

function endGame() {
    state.gameActive = false;
    document.getElementById('final-score').innerText = state.score;
    document.getElementById('end-screen').classList.remove('hidden');
}

setInterval(() => {
    if (state.gameActive && !state.paused && state.timer > 0) {
        state.timer--;
        document.getElementById('stats-timer').innerText = state.timer + "s";
        if (state.timer <= 0) endGame();
    }
}, 1000);

init();
</script>
