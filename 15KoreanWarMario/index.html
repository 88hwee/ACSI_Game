<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Korean War: Mastery Quest Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
            --sar: env(safe-area-inset-right);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background: #020617; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            color: white; 
            touch-action: none; 
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }

        .loud-font { font-family: 'Black Ops One', cursive; }
        
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at 50% 100%, #064e3b 0%, #020617 70%);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .control-btn {
            background: rgba(34, 197, 94, 0.15);
            border: 2px solid rgba(34, 197, 94, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .control-btn:active { background: rgba(34, 197, 94, 0.4); transform: scale(0.92); }

        .option-btn {
            transition: all 0.2s;
            min-height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            padding: 0.8rem 1.2rem;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95rem;
            background: #1e293b;
            border: 2px solid #334155;
            color: #fff;
            text-transform: uppercase;
        }

        #hud {
            padding-top: calc(0.75rem + var(--sat));
            padding-left: 1rem;
            padding-right: 1rem;
        }

        @media (orientation: landscape) {
            #landscape-warning { display: flex !important; }
        }

        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body>

<div id="landscape-warning" class="hidden fixed inset-0 z-[1000] bg-slate-950 flex flex-col items-center justify-center p-10 text-center">
    <div class="animate-bounce mb-4 text-green-500">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
    </div>
    <h2 class="text-2xl loud-font text-green-400 mb-2 uppercase">Switch to Portrait</h2>
    <p class="text-slate-500 text-sm">Combat deployment optimized for Portrait Mode.</p>
</div>

<div id="game-container">
    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-50 bg-slate-950/95 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl md:text-7xl font-black text-green-600 loud-font italic mb-4 tracking-tighter uppercase leading-tight">Korean War</h1>
        <p class="text-green-400 font-bold text-xs tracking-widest mb-10 uppercase">Intelligence Interception Unit</p>
        <button id="btn-start" class="px-12 py-5 bg-green-600 text-white loud-font rounded-full shadow-2xl uppercase tracking-widest text-xl active:scale-95 transition-transform border-b-4 border-green-800">
            Start Unit
        </button>
    </div>

    <!-- HUD -->
    <div id="hud" class="absolute top-0 left-0 w-full grid grid-cols-3 gap-2 pointer-events-none z-20">
        <div class="bg-green-900/40 backdrop-blur-md px-2 py-2 rounded-xl border border-green-500/30 text-center">
            <p class="text-[8px] uppercase font-black text-red-500">Lives</p>
            <p id="stats-lives" class="text-lg font-black text-white">3</p>
        </div>
        <div class="bg-green-900/40 backdrop-blur-md px-2 py-2 rounded-xl border border-green-500/30 text-center">
            <p class="text-[8px] uppercase font-black text-green-400">Score</p>
            <p id="stats-coins" class="text-lg font-black text-white">0</p>
        </div>
        <div class="bg-green-900/40 backdrop-blur-md px-2 py-2 rounded-xl border border-green-500/30 text-center">
            <p class="text-[8px] uppercase font-black text-blue-400">Time</p>
            <p id="stats-timer" class="text-lg font-black text-white">300s</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- MCQ Modal -->
    <div id="quiz-overlay" class="hidden absolute inset-0 z-[100] flex items-center justify-center bg-slate-950/98 p-4 backdrop-blur-md">
        <div class="w-full max-w-lg bg-slate-900 border-t-[8px] border-green-600 rounded-b-3xl p-6 shadow-2xl max-h-[95vh] overflow-y-auto">
            <div class="text-green-500 font-black uppercase tracking-[0.2em] text-[10px] mb-3">Intelligence Decryption</div>
            <h3 id="question-text" class="text-lg md:text-xl font-black italic uppercase mb-6 text-white leading-tight"></h3>
            <div id="options-container" class="grid grid-cols-1 gap-2.5"></div>
            <div id="feedback" class="mt-6 text-center font-black h-10 uppercase italic text-xl"></div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden absolute inset-0 z-[200] flex flex-col items-center justify-center bg-slate-950/98 p-8 text-center">
        <h1 class="text-6xl loud-font italic text-green-600 mb-8 uppercase" id="end-title">Finished</h1>
        <div class="mb-12">
            <p class="text-slate-500 text-xs uppercase font-black tracking-widest mb-2">Final Mastery</p>
            <div class="text-7xl font-black text-white" id="final-score">0</div>
        </div>
        <button id="btn-restart" class="px-12 py-5 bg-white text-black loud-font rounded-full active:bg-green-600 active:text-white transition-all uppercase tracking-widest text-lg shadow-2xl">
            Restart
        </button>
    </div>

    <!-- Controls -->
    <div class="absolute bottom-[calc(1.5rem+var(--sab))] left-0 w-full px-6 flex justify-between items-center z-30 pointer-events-none">
        <div class="flex gap-4">
            <div id="ctrl-left" class="control-btn w-20 h-20 pointer-events-auto">
                <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M15 19l-7-7 7-7"/></svg>
            </div>
            <div id="ctrl-right" class="control-btn w-20 h-20 pointer-events-auto">
                <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>
        <div id="ctrl-shoot" class="control-btn w-24 h-24 bg-red-600/20 border-red-600/40 pointer-events-auto">
            <div class="w-10 h-10 rounded-full bg-red-600 animate-pulse"></div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = {
    gameStarted: false,
    gameActive: false,
    paused: false,
    timer: 300,
    score: 0,
    lives: 3,
    viewportW: window.innerWidth,
    viewportH: window.innerHeight,
    particles: [],
    bullets: [],
    enemies: [],
    lastSpawn: 0
};

// 2x ship size for portrait visibility
const player = { x: 0, w: 120, h: 80, speed: 10 };

const questionsDeck = [
    { q: "On what date did the conventional phase of the Korean War begin?", a: "June 25, 1950", o: ["August 15, 1945", "June 25, 1950", "July 27, 1953", "October 1, 1949"] },
    { q: "What was the primary geographical dividing line between North and South Korea in 1945?", a: "The 38th Parallel", o: ["The Yalu River", "The Han River", "The 38th Parallel", "The Pusan Perimeter"] },
    { q: "Why is the Korean War often characterized as a 'civil war'?", a: "It was a conflict between two regimes claiming to be the sole legitimate government.", o: ["It only involved soldiers from one ethnic group.", "It was a conflict between two regimes claiming to be the sole legitimate government.", "It did not involve any foreign weaponry.", "It was fought entirely without international assistance."] },
    { q: "How is the Korean War defined as a 'proxy war'?", a: "Superpowers supported opposing sides but did not fight each other directly.", o: ["It was fought by robots.", "It was a war where local leaders had no power.", "Superpowers supported opposing sides but did not fight each other directly.", "It was fought entirely through economic sanctions."] },
    { q: "Before June 1950, what internal events suggested the war was already a civil conflict?", a: "Widespread insurgencies and significant border clashes resulted in ~100,000 deaths.", o: ["There were no issues before 1950.", "Widespread insurgencies and significant border clashes resulted in ~100,000 deaths.", "North and South Korea had signed a peace treaty.", "The UN had successfully unified the country."] },
    { q: "What was the central U.S. foreign policy goal during the Korean War?", a: "Containment", o: ["Expansionism", "Containment", "Isolationism", "Imperialism"] },
    { q: "How did President Truman officially describe the military intervention to avoid a formal declaration of war?", a: "A 'police action'", o: ["A total war", "A 'police action'", "An invasion", "A liberation mission"] },
    { q: "What was the 'Domino Theory' in the context of the U.S. intervention?", a: "The belief that if South Korea fell, neighboring countries like Japan would follow.", o: ["A strategy involving game pieces.", "The belief that if South Korea fell, neighboring countries like Japan would follow.", "The idea that all wars start with a single incident.", "A plan to drop leaflets shaped like dominoes."] },
    { q: "Which document advocated for a massive buildup of U.S. military power to counter the Soviet threat?", a: "NSC-68", o: ["The Truman Doctrine", "The Cairo Declaration", "NSC-68", "The Marshall Plan"] },
    { q: "The United States provided approximately what percentage of the UN military personnel?", a: "90%", o: ["50%", "90%", "10%", "100%"] },
    { q: "Who was the chosen leader of the Soviet-backed 'client state' in North Korea?", a: "Kim Il Sung", o: ["Syngman Rhee", "Mao Zedong", "Kim Il Sung", "Peng Dehuai"] },
    { q: "Why was the Soviet Union unable to veto the UN Security Council resolution to assist South Korea?", a: "They were boycotting the UN because it refused to recognize the PRC.", o: ["They had lost their veto power.", "They were boycotting the UN because it refused to recognize the PRC.", "They actually supported the resolution.", "They were not members of the UN at the time."] },
    { q: "What was Stalin’s primary strategic priority in the late 1940s?", a: "Creating a buffer zone of communist states in Eastern Europe.", o: ["Dominating South America.", "Creating a buffer zone of communist states in Eastern Europe.", "Starting a war with the U.S. in Japan.", "Disbanding the Red Army."] },
    { q: "When did Stalin finally give Kim Il Sung the 'green light' to invade?", a: "Late January 1950", o: ["1945", "Late January 1950", "After Inchon", "1953"] },
    { q: "What did Stalin warn Kim would happen if the invasion backfired?", a: "'I shall not lift a finger' to help directly.", o: ["He would send the entire Soviet Army.", "'I shall not lift a finger' to help directly.", "He would surrender to the U.S.", "He would use nuclear weapons."] },
    { q: "What phrase did Premier Zhou Enlai use to describe the security relationship between China and Korea?", a: "As closely related as lips and teeth", o: ["Brothers in arms", "As closely related as lips and teeth", "One nation, one goal", "The Great Wall of Communism"] },
    { q: "Under what name did China constitute its forces to avoid an official war with the U.S.?", a: "The People's Volunteer Army (PVA)", o: ["The Red Army", "The People's Liberation Army", "The People's Volunteer Army (PVA)", "The Northeastern Border Defense Army"] },
    { q: "Why was Mao Zedong initially reluctant to intervene?", a: "He wanted to focus on domestic reconstruction and 'liberating' Taiwan.", o: ["He was a pacifist.", "He wanted to focus on domestic reconstruction and 'liberating' Taiwan.", "He did not like Kim Il Sung.", "He thought the U.S. was his ally."] },
    { q: "What triggered the massive Chinese intervention in late 1950?", a: "UNC forces crossing the 38th parallel and advancing toward the Yalu River.", o: ["The death of Stalin.", "UNC forces crossing the 38th parallel and advancing toward the Yalu River.", "A formal declaration of war by Rhee.", "The start of the Inchon landing."] },
    { q: "What tactic did the PVA use to mitigate the UN's superior air and firepower?", a: "Night fighting, camouflage, and marching 'dark-to-dark.'", o: ["Building massive bunkers.", "Night fighting, camouflage, and marching 'dark-to-dark.'", "Using heavy tanks in broad daylight.", "Retreating whenever they saw a plane."] },
    { q: "What was Syngman Rhee’s stance on a peaceful armistice?", a: "He strongly opposed it, wishing to reunite the peninsula by force.", o: ["He was the lead negotiator.", "He strongly opposed it, wishing to reunite the peninsula by force.", "He suggested it first.", "He didn't care about the outcome."] },
    { q: "What was the 'Bodo League' in South Korea?", a: "A re-education movement for suspected sympathizers who were later executed.", o: ["A professional baseball organization.", "A re-education movement for suspected sympathizers who were later executed.", "A group of military advisors.", "Rhee's cabinet members."] },
    { q: "Kim Il Sung based his confidence for a quick victory on which assumption?", a: "A popular uprising against Rhee would occur in the South.", o: ["The South had no soldiers.", "A popular uprising against Rhee would occur in the South.", "Stalin would send nuclear bombs.", "He had 10 million tanks."] },
    { q: "Which ideology did Kim Il Sung establish emphasizing self-reliance?", a: "Juche", o: ["Marxism-Leninism", "Juche", "Maoism", "Capitalism"] },
    { q: "Before the war, why was the ROK Army poorly equipped compared to the KPA?", a: "The U.S. withheld heavy weaponry to prevent Rhee from attacking the North.", o: ["They had no money.", "The U.S. withheld heavy weaponry to prevent Rhee from attacking the North.", "Rhee preferred a light infantry approach.", "They had sold all their equipment to China."] },
    { q: "What was the daring amphibious assault planned by MacArthur?", a: "Operation Chromite (The Inchon Landing)", o: ["The Yalu River Crossing", "Operation Chromite (The Inchon Landing)", "Operation Thunderbolt", "The Chosin Reservoir breakout"] },
    { q: "MacArthur’s 'rollback' policy represent as a shift from original goals?", a: "Moving beyond containment to destroy the DPRK and reunite Korea.", o: ["Returning all troops home immediately.", "Moving beyond containment to destroy the DPRK and reunite Korea.", "Rolling tanks backward.", "Ending the war through trade."] },
    { q: "Where did MacArthur meet President Truman to assure him China would not intervene?", a: "Wake Island", o: ["The White House", "Wake Island", "Tokyo", "Panmunjom"] },
    { q: "MacArthur’s strategy to deal with Chinese intervention:", a: "Extending the war into China, naval blockade and nuclear weapons.", o: ["Total withdrawal.", "Extending the war into China, naval blockade and nuclear weapons.", "Asking for UN mediation.", "Surrendering immediately."] },
    { q: "Reason President Truman gave for firing General MacArthur?", a: "Insubordination and violation of civilian control over the military.", o: ["Losing too many battles.", "Insubordination and violation of civilian control over the military.", "Old age.", "Taking too many vacations."] },
    { q: "What was the 'Pusan Perimeter'?", a: "The last line of defense in the southeastern tip of Korea.", o: ["A new type of tank.", "The last line of defense in the southeastern tip of Korea.", "A strategy to drop leaflets.", "The border with Manchuria."] },
    { q: "The 'Chosin Few' refers to soldiers from which battle?", a: "Chosin Reservoir", o: ["Inchon", "Chosin Reservoir", "Triangle Hill", "Heartbreak Ridge"] },
    { q: "What became the biggest 'sticking point' in peace negotiations after July 1951?", a: "The repatriation of prisoners of war (POWs).", o: ["The location of the capital.", "The repatriation of prisoners of war (POWs).", "The use of the Korean language.", "Food supplies."] },
    { q: "Why did many Chinese and North Korean POWs refuse to return home?", a: "Fear of punishment for being captured or for political views.", o: ["Better jobs in the U.S.", "Fear of punishment for being captured or for political views.", "Forgotten where they lived.", "Brainwashed."] },
    { q: "The term 'MiG Alley' refers to:", a: "Northwestern North Korea where jet air combat occurred.", o: ["A bowling alley.", "Northwestern North Korea where jet air combat occurred.", "A street in Seoul.", "A supply route."] },
    { q: "Propaganda leaflets dropped by UN forces during the war?", a: "2.5 billion", o: ["1 million", "100 million", "2.5 billion", "50 billion"] },
    { q: "What was the primary goal of 'Operation Strike'?", a: "To warn civilians of imminent bombing raids to flee and clog roads.", o: ["To encourage strikes.", "To warn civilians of imminent bombing raids to flee and clog roads.", "To strike down the enemy flag.", "Inchon landing."] },
    { q: "The 'Pseudo-Kim Il Sung' theory spread by U.S. propaganda:", a: "That the current Kim was a fake masquerading as a hero.", o: ["That Kim was a robot.", "That the current Kim was a fake masquerading as a hero.", "That Kim was actually a capitalist.", "American spy."] },
    { q: "How did the U.S. overcome the illiteracy rate among enemy troops?", a: "Using cartoon-based leaflets like 'Sad Sack'.", o: ["Teachers.", "Using cartoon-based leaflets like 'Sad Sack'.", "Dropping books.", "Loudspeakers."] },
    { q: "Who succeeded Truman and was elected in 1952?", a: "Dwight D. Eisenhower", o: ["Richard Nixon", "Dwight D. Eisenhower", "John F. Kennedy", "Lyndon B. Johnson"] },
    { q: "What major event in March 1953 shifted the Soviet position?", a: "The death of Joseph Stalin.", o: ["Hydrogen bomb.", "The death of Joseph Stalin.", "Capture of Moscow.", "Massive drought."] },
    { q: "Where was the Korean Armistice Agreement signed?", a: "Panmunjom", o: ["Seoul", "Pyongyang", "Panmunjom", "Tokyo"] },
    { q: "What is the name of the buffer zone created by the armistice?", a: "The Demilitarized Zone (DMZ)", o: ["No-Man's Land", "The Demilitarized Zone (DMZ)", "Iron Curtain", "Bamboo Curtain"] },
    { q: "Was a formal peace treaty signed to officially end the war?", a: "No, technically North and South Korea remain in a state of war.", o: ["Yes, in 1953.", "No, technically North and South Korea remain in a state of war.", "China and US only.", "UN vetoed it."] },
    { q: "Exchange of deceased soldiers result of armistice:", a: "Operation Glory, an exchange of dead bodies.", o: ["Left in fields.", "Operation Glory, an exchange of dead bodies.", "Mass burial.", "Giant monument."] },
    { q: "Long term affect on U.S. defense budget?", a: "Tripling of armed forces and doubling of the Pentagon budget.", o: ["Budget cuts.", "Tripling of armed forces and doubling of the Pentagon budget.", "No effect.", "State Department moved."] },
    { q: "How did the war impact Japan’s economy?", a: "U.S. wartime spending 'jump-started' the economy.", o: ["Destroyed factories.", "U.S. wartime spending 'jump-started' the economy.", "War payments.", "Agricultural society."] },
    { q: "Why is the Korean War often called 'The Forgotten War'?", a: "It was overshadowed by World War II and the Vietnam War.", o: ["Everyone forgot.", "It was overshadowed by World War II and the Vietnam War.", "Too short.", "Burned records."] }
];

let sessionDeck = [];
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function buildSessionDeck() {
    return shuffle([...questionsDeck]);
}
sessionDeck = buildSessionDeck();

function resize() {
    state.viewportW = window.innerWidth;
    state.viewportH = window.innerHeight;
    canvas.width = state.viewportW;
    canvas.height = state.viewportH;
    player.x = state.viewportW / 2 - player.w / 2;
}

const touchInput = { left: false, right: false };
function init() {
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
    resize();
    
    document.getElementById('btn-start').onclick = () => {
        document.getElementById('start-screen').classList.add('hidden');
        state.gameStarted = true; state.gameActive = true;
    };
    document.getElementById('btn-restart').onclick = () => location.reload();

    const setupTouch = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); touchInput[key] = true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); touchInput[key] = false; });
    };
    setupTouch('ctrl-left', 'left');
    setupTouch('ctrl-right', 'right');
    document.getElementById('ctrl-shoot').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (state.gameActive && !state.paused) shoot();
    });

    requestAnimationFrame(update);
}

function shoot() {
    // Spawns from front of ship higher up in portrait to clear controls
    state.bullets.push({ x: player.x + player.w/2 - 4, y: state.viewportH - 180, r: 10, speed: 14 });
}

function spawnEnemy() {
    const r = 35;
    state.enemies.push({
        x: Math.random() * (state.viewportW - r*2) + r,
        y: -r,
        r: r,
        speed: 2.5 + Math.random() * 2,
        type: 'mcq'
    });
}

function createFireworks(x, y) {
    const colors = ['#22c55e', '#fbbf24', '#3b82f6', '#ef4444', '#ffffff'];
    for (let i = 0; i < 60; i++) {
        state.particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 16,
            vy: (Math.random() - 0.5) * 16,
            life: 1.0,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 5 + 2
        });
    }
}

function triggerQuiz() {
    state.paused = true;
    const q = sessionDeck[0];
    const modal = document.getElementById('quiz-overlay');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('stats-q').innerText = sessionDeck.length;
    container.innerHTML = '';
    feedback.innerText = '';
    
    shuffle([...q.o]).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => {
            Array.from(container.children).forEach(b => b.disabled = true);
            if (opt === q.a) {
                state.score += 50;
                document.getElementById('stats-coins').innerText = state.score;
                createFireworks(state.viewportW / 2, state.viewportH / 2);
                sessionDeck.shift();
                if (sessionDeck.length === 0) endGame(true);
                else resume();
            } else {
                btn.classList.add('wrong');
                feedback.innerText = `Incorrect. Intel: ${q.a}`;
                feedback.className = "mt-4 text-center font-black uppercase italic text-red-500 text-lg";
                
                // Reinforcement: Re-queue 3 positions later
                const missed = sessionDeck.shift();
                const targetPos = Math.min(3, sessionDeck.length);
                sessionDeck.splice(targetPos, 0, missed);
                
                setTimeout(() => {
                    state.lives--;
                    document.getElementById('stats-lives').innerText = state.lives;
                    if (state.lives <= 0) endGame(false);
                    else resume();
                }, 2200);
            }
        };
        container.appendChild(btn);
    });
    modal.classList.remove('hidden');
}

function resume() {
    document.getElementById('quiz-overlay').classList.add('hidden');
    state.paused = false;
}

function update() {
    if (!state.gameStarted) { requestAnimationFrame(update); return; }

    if (!state.paused) {
        if (touchInput.left && player.x > 0) player.x -= player.speed;
        if (touchInput.right && player.x < state.viewportW - player.w) player.x += player.speed;

        if (Date.now() - state.lastSpawn > 2200) {
            spawnEnemy();
            state.lastSpawn = Date.now();
        }

        for (let i = state.bullets.length - 1; i >= 0; i--) {
            const b = state.bullets[i];
            b.y -= b.speed;
            if (b.y < -20) state.bullets.splice(i, 1);
        }

        for (let i = state.enemies.length - 1; i >= 0; i--) {
            const en = state.enemies[i];
            en.y += en.speed;
            if (en.y > state.viewportH + en.r) {
                state.enemies.splice(i, 1);
                state.lives--;
                document.getElementById('stats-lives').innerText = state.lives;
                if (state.lives <= 0) endGame(false);
                continue;
            }

            for (let j = state.bullets.length - 1; j >= 0; j--) {
                const b = state.bullets[j];
                const dist = Math.hypot(b.x - en.x, b.y - en.y);
                if (dist < en.r + 20) {
                    state.bullets.splice(j, 1);
                    state.enemies.splice(i, 1);
                    triggerQuiz();
                    break;
                }
            }
        }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.025;
        if (p.life <= 0) state.particles.splice(i, 1);
    }

    render();
    requestAnimationFrame(update);
}

function render() {
    ctx.clearRect(0, 0, state.viewportW, state.viewportH);
    
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    for(let i=0; i<30; i++) {
        ctx.fillRect((Date.now()/70 + i*141) % state.viewportW, (i*179) % state.viewportH, 2, 2);
    }

    // Player positioned high to avoid touch controls
    ctx.fillStyle = "#16a34a";
    ctx.fillRect(player.x, state.viewportH - 160, player.w, 45);
    ctx.fillStyle = "#15803d";
    ctx.fillRect(player.x + (player.w * 0.25), state.viewportH - 185, player.w * 0.5, 25);

    state.enemies.forEach(en => {
        ctx.beginPath();
        ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2);
        ctx.fillStyle = "#475569";
        ctx.fill();
        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 24px Inter";
        ctx.textAlign = "center";
        ctx.fillText("?", en.x, en.y + 8);
    });

    ctx.fillStyle = "#fbbf24";
    state.bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, 8, 22);
    });

    state.particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;
}

function endGame(victory) {
    state.gameActive = false;
    document.getElementById('end-title').innerText = victory ? "KOREA MASTERED" : "MISSION FAILED";
    document.getElementById('end-title').className = victory ? "text-6xl loud-font italic text-green-600 mb-6 uppercase" : "text-6xl loud-font italic text-red-600 mb-6 uppercase";
    document.getElementById('final-score').innerText = state.score;
    document.getElementById('end-screen').classList.remove('hidden');
}

setInterval(() => {
    if (state.gameActive && !state.paused && state.timer > 0) {
        state.timer--;
        document.getElementById('stats-timer').innerText = state.timer + "s";
        if (state.timer <= 0) endGame(false);
    }
}, 1000);

init();
</script>
