<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation: Cu Chi Mastery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;700;900&display=swap');

        body { 
            margin: 0; 
            background: #020617; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            color: white; 
        }

        #game-container {
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background: linear-gradient(to bottom, #064e3b, #022c22); 
            overflow: hidden;
        }

        canvas { display: block; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200;
        }

        #btn-start {
            padding: 20px 40px; font-size: 24px; font-weight: 900; color: #fff;
            background: #b91c1c; border: 4px solid #3b82f6; border-radius: 0; cursor: pointer; 
            transition: all 0.2s; text-transform: uppercase; font-family: 'Black Ops One';
        }

        #btn-start:hover { transform: scale(1.1); background: #3b82f6; box-shadow: 0 0 30px #ef4444; }

        #ui-layer { 
            position: absolute; top: 20px; left: 30px; right: 30px; 
            pointer-events: none; display: flex; justify-content: space-between; 
            font-weight: 900; text-shadow: 2px 2px #000; font-size: 24px; z-index: 10; 
        }

        #stats-coins { color: #facc15; }
        #stats-mode { color: #3b82f6; text-transform: uppercase; font-size: 14px; letter-spacing: 0.2em; }

        #quiz-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98); display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 40px; z-index: 100;
        }

        .option-btn { 
            background: #1e293b; color: #fff; border: 2px solid #3b82f6; 
            padding: 15px; margin: 8px; cursor: pointer; width: 100%; max-width: 800px; 
            border-radius: 4px; font-size: 18px; font-weight: bold; transition: 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) { background: #b91c1c; border-color: #ef4444; transform: translateX(10px); }
        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .wrong { background: #991b1b !important; border-color: #ef4444 !important; }

        #message { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; display: none; text-align: center; 
            text-shadow: 6px 6px 0px #000; z-index: 110; font-weight: 900; color: #ef4444; width: 100%; 
        }

        .feedback-text { font-size: 24px; font-weight: 900; margin-top: 20px; text-transform: uppercase; font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="color: #ef4444; font-size: 64px; margin-bottom: 10px; font-family: 'Black Ops One';">OPERATION: CU CHI</h1>
        <p style="margin-bottom: 30px; font-weight: bold; color: #3b82f6; letter-spacing: 0.1em;">80 INTEL TARGETS • VERTICAL SHAFT TRANSITION • CRAWL TO ESCAPE</p>
        <button id="btn-start">DEPLOY MISSION</button>
    </div>

    <div id="ui-layer">
        <div id="stats-mode">SECTOR: JUNGLE SURFACE</div>
        <div id="stats-coins">GOLD: 0</div>
        <div id="stats-timer">180s</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="quiz-overlay">
        <div id="sector-indicator" style="color: #3b82f6; font-size: 14px; font-weight: 900; letter-spacing: 0.2em; margin-bottom: 10px;">DECRYPTION INTERFACE</div>
        <div id="question-text" style="color: #fff; font-size: 26px; font-weight: 900; margin-bottom: 30px; max-width: 900px; line-height: 1.2;"></div>
        <div id="options-container" style="width:100%; display: flex; flex-direction: column; align-items: center;"></div>
        <div id="quiz-feedback" class="feedback-text"></div>
    </div>

    <div id="message"></div>
</div>

const ctx = canvas.getContext('2d');

let gameStarted = false, gameActive = false, inTunnel = false, isFallingToTunnel = false;
let timer = 180, coins = 0;
const gravity = 0.45;

const player = { 
    x: 100, y: 200, w: 50, h: 65, vx: 0, vy: 0, 
    speed: 7, jumpPower: -13, grounded: false, 
    facingRight: true, jumpsLeft: 3 
};

let spaceReleased = true;
let particles = [];

    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;

];

let questionsDeck = shuffle([...masterDeck]);

let blocks = [];
function generateBlocks() {
    const groundY = canvas.height - 80;
    blocks = Array.from({length: 60}, (_, i) => ({ 
        x: 600 + (i * 350), 
        y: inTunnel ? (canvas.height - 180) : groundY - (130 + (Math.random() * 220)), 
        w: 60, h: 60, active: true 
    }));
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    generateBlocks();
}
window.addEventListener('resize', resize);
resize();

document.getElementById('btn-start').onclick = () => {
    document.getElementById('start-screen').style.display = 'none';
    gameStarted = true; gameActive = true;
};

const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => {
    keys[e.code] = false;
    if (e.code === 'Space') spaceReleased = true;
};

function createFireworks(x, y) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 0.5) * 12,
            life: 1.0,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`
        });
    }
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
    if (!player.facingRight) ctx.scale(-1, 1);
    
    // Player Color Scheme
    ctx.fillStyle = inTunnel ? "#7c2d12" : (player.facingRight ? "#3b82f6" : "#ef4444"); 

    if (inTunnel) {
        // CRAWL STANCE
        ctx.fillRect(-25, 10, 50, 20); 
        ctx.fillStyle = "#ffdbac";
        ctx.fillRect(20, 10, 15, 15);
    } else {
        // STAND STANCE
        ctx.fillRect(-15, -30, 30, 50);
        ctx.fillStyle = "#ffdbac"; 
        ctx.fillRect(-12, -45, 24, 20);
        ctx.fillStyle = "#1e3a8a"; 
        ctx.fillRect(-15, -50, 30, 10);
    }
    ctx.restore();
}

function triggerQuiz() {
    gameActive = false;
    const currentQ = questionsDeck[0];
    const overlay = document.getElementById('quiz-overlay');
    const qText = document.getElementById('question-text');
    const feedback = document.getElementById('quiz-feedback');
    const container = document.getElementById('options-container');

    qText.innerText = currentQ.q;
    feedback.innerText = "";
    container.innerHTML = '';

    let opts = shuffle([...currentQ.a]);

    opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; 
        btn.innerText = opt;
        btn.onclick = () => {
            const btns = container.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            if (opt === currentQ.correct) {
                btn.classList.add('correct');
                coins += 50;
                document.getElementById('stats-coins').innerText = `GOLD: ${coins}`;
                feedback.innerText = "INTEL SECURED!";
                feedback.style.color = "#22c55e";
                createFireworks(canvas.width/2, canvas.height/2);
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    questionsDeck.shift(); 
                    if (inTunnel) exitTunnel();
                    gameActive = (timer > 0);
                }, 1200);
            } else {
                btn.classList.add('wrong');
                feedback.innerText = "WRONG! CORRECT ANSWER: " + currentQ.correct;
                feedback.style.color = "#ef4444";
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    const missed = questionsDeck.shift();
                    // Repeat 3 questions later
                    questionsDeck.splice(3, 0, missed);
                    initTunnelFall();
                }, 3000);
            }
        };
        container.appendChild(btn);
    });
    overlay.style.display = 'flex';
}

function initTunnelFall() {
    isFallingToTunnel = true;
    gameActive = true;
    player.grounded = false;
    // Disable ground on surface momentarily
}

function enterTunnel() {
    inTunnel = true;
    isFallingToTunnel = false;
    document.getElementById('stats-mode').innerText = "SECTOR: CU CHI TUNNELS";
    document.getElementById('stats-mode').style.color = "#ef4444";
    player.w = 50;
    player.h = 30; // Reduce physics height for crawl
    player.vy = 0;
    player.y = -50; // Fall in from top
    generateBlocks();
}

function exitTunnel() {
    inTunnel = false;
    document.getElementById('stats-mode').innerText = "SECTOR: JUNGLE SURFACE";
    document.getElementById('stats-mode').style.color = "#3b82f6";
    player.w = 50;
    player.h = 65; // Reset physics height
    player.y = -100; // Drop from sky for variety
    generateBlocks();
}

function update() {
    if (!gameStarted) { requestAnimationFrame(update); return; }
    
    if (timer <= 0 && gameActive) {
        gameActive = false;
        document.getElementById('message').style.display = 'block';
        document.getElementById('message').innerText = "TIME EXPIRED";
    }

    if (gameActive) {
        // MOVEMENT
        if (keys['ArrowRight']) { player.vx = player.speed; player.facingRight = true; }
        else if (keys['ArrowLeft']) { player.vx = -player.speed; player.facingRight = false; }
        else player.vx *= 0.8;

        // JUMP (Surface only)
        if (!inTunnel && !isFallingToTunnel && keys['Space'] && player.jumpsLeft > 0 && spaceReleased) { 
            player.vy = player.jumpPower; 
            player.jumpsLeft--;
            player.grounded = false; 
            spaceReleased = false;
        }

        player.vy += gravity; 
        player.x += player.vx; 
        player.y += player.vy;

        // PHYSICS & COLLISION
        if (isFallingToTunnel) {
            // Player is falling off bottom of jungle
            if (player.y > canvas.height + 100) {
                enterTunnel();
            }
        } else {
            const groundY = inTunnel ? (canvas.height - 100) : (canvas.height - 80);
            if (player.y + player.h > groundY) { 
                player.y = groundY - player.h; 
                player.vy = 0; 
                player.grounded = true; 
                player.jumpsLeft = 3; 
            }
        }

        // BLOCK COLLISION
        blocks.forEach((b) => {
            if (b.active && player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
                const trigger = inTunnel ? true : (player.vy < 0 && (player.y + player.h / 2) > (b.y + b.h / 2));
                if (trigger) {
                    b.active = false; 
                    if (!inTunnel) player.vy = 4;
                    if (questionsDeck.length > 0) triggerQuiz();
                }
            }
        });
    }

    // PARTICLES
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });

    // DRAWING
    ctx.setTransform(1,0,0,1,0,0); 
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    let camX = -player.x + canvas.width / 4; 
    if (camX > 0) camX = 0;
    ctx.translate(camX, 0);

    // BACKGROUNDS
    if (inTunnel) {
        ctx.fillStyle = '#451a03'; ctx.fillRect(-2000, 0, 20000, canvas.height);
        ctx.fillStyle = '#78350f'; ctx.fillRect(-2000, canvas.height - 150, 20000, 150);
    } else if (isFallingToTunnel) {
        // Show a "shaft" background
        ctx.fillStyle = '#064e3b'; ctx.fillRect(-2000, -2000, 20000, 2080);
        ctx.fillStyle = '#222'; ctx.fillRect(player.x - 50, -5000, 150, 10000);
    } else {
        ctx.fillStyle = '#064e3b'; ctx.fillRect(-2000, canvas.height - 80, 20000, 80);
    }

    // BLOCKS
    blocks.forEach(b => {
        if (b.active) {
            ctx.fillStyle = inTunnel ? '#ef4444' : '#3b82f6'; 
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = 'white'; ctx.font = 'bold 30px Inter'; ctx.textAlign = 'center';
            ctx.fillText('?', b.x + b.w/2, b.y + b.h/2 + 10);
        }
    });

    // RENDER FIREWORKS
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    drawPlayer();
    requestAnimationFrame(update);
}

setInterval(() => {
    if (gameActive && timer > 0) {
        timer--;
        document.getElementById('stats-timer').innerText = timer + "s";
    }
}, 1000);

update();
</script>
</body>
</html>
