<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Operation: Cu Chi Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Inter:wght@400;700;900&display=swap');

        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
            --sar: env(safe-area-inset-right);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background: #020617; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            color: white; 
            touch-action: none; 
            height: 100vh;
            width: 100vw;
        }

        .loud-font { font-family: 'Black Ops One', cursive; }
        
        #game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(to bottom, #064e3b, #022c22);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* Mobile Controls - Landscape Optimized */
        .ctrl-zone {
            position: absolute;
            bottom: calc(1rem + var(--sab));
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 2rem;
            pointer-events: none;
            z-index: 50;
        }

        .btn-group { display: flex; gap: 1.5rem; pointer-events: auto; }
        
        .touch-btn {
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: auto;
        }
        
        .touch-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.9); }

        /* MCQ Modal */
        .option-btn {
            transition: all 0.2s;
            min-height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            padding: 0.8rem 1.2rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            background: #1e293b;
            border: 2px solid #334155;
            color: #fff;
            text-transform: uppercase;
        }
        
        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .wrong { background: #991b1b !important; border-color: #ef4444 !important; }

        #hud {
            position: absolute;
            top: calc(0.5rem + var(--sat));
            left: 1rem;
            right: 1rem;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 40;
        }

        .hud-item {
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 1rem;
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }

        @media (orientation: portrait) {
            #portrait-warning { display: flex !important; }
        }
    </style>
</head>
<body>

<div id="portrait-warning" class="hidden fixed inset-0 z-[1000] bg-slate-950 flex flex-col items-center justify-center p-10 text-center">
    <div class="animate-bounce mb-4 text-red-500">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
    </div>
    <h2 class="text-2xl loud-font text-red-400 mb-2 uppercase">Switch to Landscape</h2>
    <p class="text-slate-500 text-sm">Operation Cu Chi requires a wide field of vision.</p>
</div>

<div id="game-container">
    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-[100] bg-slate-950/95 flex flex-col items-center justify-center p-8 text-center">
        <h1 class="text-5xl md:text-7xl font-black text-red-600 loud-font italic mb-2 uppercase">Operation: Cu Chi</h1>
        <p class="text-blue-400 font-bold text-xs tracking-widest mb-10 uppercase">Intelligence Mastery & Tunnel Evasion</p>
        
        <div id="play-tracker" class="mb-8 opacity-0 transition-opacity">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Total Mission Deployments</p>
            <p id="global-play-count" class="text-3xl font-black text-white">---</p>
        </div>

        <button id="btn-start" class="px-16 py-6 bg-red-700 text-white loud-font rounded-lg shadow-2xl uppercase tracking-widest text-xl active:scale-95 transition-all border-b-4 border-red-900">
            Deploy Mission
        </button>
    </div>

    <div id="hud">
        <div id="stats-sector" class="hud-item text-blue-400 uppercase">Sector: Jungle Surface</div>
        <div id="stats-timer" class="hud-item text-white">180s</div>
        <div id="stats-intel" class="hud-item text-yellow-400 uppercase">Intel: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Quiz Overlay -->
    <div id="quiz-overlay" class="hidden absolute inset-0 z-[150] flex items-center justify-center bg-slate-950/98 p-6 backdrop-blur-md">
        <div class="w-full max-w-2xl bg-slate-900 border-l-[8px] border-red-600 p-8 shadow-2xl rounded-r-xl overflow-y-auto max-h-[90vh]">
            <div class="text-red-500 font-black uppercase tracking-widest text-xs mb-4">DECRYPTION REQUIRED</div>
            <h3 id="question-text" class="text-xl md:text-2xl font-black italic uppercase mb-8 text-white leading-tight"></h3>
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            <div id="quiz-feedback" class="mt-8 text-center font-black uppercase italic text-lg h-8"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="ctrl-zone">
        <div class="btn-group">
            <div id="btn-left" class="touch-btn">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </div>
            <div id="btn-right" class="touch-btn">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>
        <div class="btn-group">
            <div id="btn-jump" class="touch-btn bg-red-600/20 border-red-600/40">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"/></svg>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

// Configuration
const firebaseConfig = JSON.parse(__firebase_config);
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'cu-chi-mastery-revision';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = {
    gameStarted: false,
    gameActive: false,
    paused: false,
    inTunnel: false,
    timer: 180,
    intel: 0,
    viewportW: window.innerWidth,
    viewportH: window.innerHeight,
    user: null,
    scrollX: 0,
    groundGaps: [],
    intelBlocks: []
};

const player = {
    x: 100, y: 0, w: 40, h: 60,
    vx: 0, vy: 0,
    speed: 7, jumpPower: -12,
    grounded: false,
    facingRight: true
};

const masterDeck = [
    { q: "What was the duration of the Korean War?", a: ["1945–1948", "1950–1953", "1954–1957", "1960–1963"], correct: "1950–1953" },
    { q: "Which battle led to the French withdrawal from Indochina in May 1954?", a: ["Dien Bien Phu", "Saigon", "Hue", "Ia Drang"], correct: "Dien Bien Phu" },
    { q: "What agreement partitioned Vietnam into North and South in July 1954?", a: ["Paris Accords", "Geneva Accords", "SEATO Treaty", "Tonkin Resolution"], correct: "Geneva Accords" },
    { q: "Along which parallel was Vietnam divided after the 1954 conference?", a: "The 17th Parallel", o: ["38th Parallel", "17th Parallel", "20th Parallel", "10th Parallel"], correct: "17th Parallel" },
    { q: "What programme relocated peasants into fortifications?", a: ["Search and Destroy", "Strategic Hamlet", "Containment", "Village Liberation"], correct: "Strategic Hamlet" },
    { q: "In what year was the Ho Chi Minh Trail established?", a: "1959", o: ["1954", "1956", "1959", "1965"], correct: "1959" },
    { q: "What was the formal name of the Viet Cong?", a: "National Liberation Front", o: ["Viet Minh", "National Liberation Front", "Red Army", "People's Army"], correct: "National Liberation Front" },
    { q: "What does guerrilla mean in Spanish?", a: "Little war", o: ["Hidden hunter", "Jungle trap", "Little war", "Sudden death"], correct: "Little war" },
    { q: "Approximately how long were the VC tunnel systems?", a: "More than 300km", o: ["50km", "150km", "300km+", "1000km"], correct: "300km+" },
    { q: "What event in August 1964 increased US involvement?", a: "Gulf of Tonkin incident", o: ["Tet Offensive", "Gulf of Tonkin incident", "Dien Bien Phu", "Ia Drang"], correct: "Gulf of Tonkin incident" }
];

let questionsDeck = [...masterDeck].sort(() => Math.random() - 0.5);

function generateWorld() {
    state.groundGaps = [];
    state.intelBlocks = [];
    for (let i = 1; i < 50; i++) {
        // Random gaps in ground
        if (Math.random() > 0.8) {
            state.groundGaps.push({ x: i * 500, w: 150 });
        }
        // Floating intel blocks
        state.intelBlocks.push({
            x: i * 400 + Math.random() * 200,
            y: state.viewportH - 220 - Math.random() * 100,
            w: 50, h: 50, active: true
        });
    }
}

async function initTracking() {
    const analyticsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'usage', 'stats');
    await signInAnonymously(auth).catch(() => {});
    onAuthStateChanged(auth, (user) => {
        state.user = user;
        if (user) {
            onSnapshot(analyticsDoc, (snap) => {
                if (snap.exists()) {
                    document.getElementById('global-play-count').innerText = (snap.data().playCount || 0).toLocaleString();
                    document.getElementById('play-tracker').style.opacity = '1';
                } else {
                    setDoc(analyticsDoc, { playCount: 0 });
                }
            });
        }
    });
}

async function recordDeployment() {
    if (!state.user) return;
    const analyticsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'usage', 'stats');
    try { await updateDoc(analyticsDoc, { playCount: increment(1) }); }
    catch { await setDoc(analyticsDoc, { playCount: 1 }, { merge: true }); }
}

const input = { left: false, right: false, jump: false };
function setupControls() {
    const bind = (id, key) => {
        const el = document.getElementById(id);
        el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); input[key] = true; };
        el.onmouseup = el.onmouseleave = el.ontouchend = (e) => { e.preventDefault(); input[key] = false; };
    };
    bind('btn-left', 'left');
    bind('btn-right', 'right');
    bind('btn-jump', 'jump');
    
    window.onkeydown = (e) => {
        if (e.code === 'ArrowLeft') input.left = true;
        if (e.code === 'ArrowRight') input.right = true;
        if (e.code === 'Space') input.jump = true;
    };
    window.onkeyup = (e) => {
        if (e.code === 'ArrowLeft') input.left = false;
        if (e.code === 'ArrowRight') input.right = false;
        if (e.code === 'Space') input.jump = false;
    };
}

function resize() {
    state.viewportW = window.innerWidth;
    state.viewportH = window.innerHeight;
    canvas.width = state.viewportW;
    canvas.height = state.viewportH;
    generateWorld();
}

function triggerQuiz() {
    state.paused = true;
    const q = questionsDeck[0];
    const overlay = document.getElementById('quiz-overlay');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('quiz-feedback');
    
    document.getElementById('question-text').innerText = q.q;
    container.innerHTML = '';
    feedback.innerText = '';
    
    const options = (q.o || q.a).sort(() => Math.random() - 0.5);
    
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => {
            const btns = container.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);
            
            if (opt === q.correct) {
                btn.classList.add('correct');
                state.intel += 1;
                document.getElementById('stats-intel').innerText = `INTEL: ${state.intel}`;
                feedback.innerText = "Intel Decrypted Successfully";
                feedback.className = "mt-8 text-center font-black uppercase text-green-500 italic";
                questionsDeck.shift();
                if (questionsDeck.length === 0) questionsDeck = [...masterDeck];
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    state.paused = false;
                }, 1000);
            } else {
                btn.classList.add('wrong');
                btns.forEach(b => { if(b.innerText === q.correct) b.classList.add('correct'); });
                feedback.innerText = `CORRECT INTEL: ${q.correct}`;
                feedback.className = "mt-8 text-center font-black uppercase text-red-500 italic";
                
                // Spaced Repetition Logic
                const missed = questionsDeck.shift();
                questionsDeck.splice(3, 0, missed);
                
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    state.paused = false;
                }, 2500);
            }
        };
        container.appendChild(btn);
    });
    overlay.classList.remove('hidden');
}

function update() {
    if (!state.gameStarted || state.paused) return requestAnimationFrame(update);

    // Timer
    if (Date.now() % 1000 < 20) {
        state.timer -= 0.02;
        document.getElementById('stats-timer').innerText = Math.ceil(state.timer) + "s";
    }

    // Physics
    if (input.left) { player.vx = -player.speed; player.facingRight = false; }
    else if (input.right) { player.vx = player.speed; player.facingRight = true; }
    else { player.vx *= 0.8; }

    if (input.jump && player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
    }

    player.vy += 0.6; // Gravity
    player.x += player.vx;
    player.y += player.vy;

    // Ground Logic
    const groundLevel = state.viewportH - 80;
    let onGround = false;
    
    // Check if player is over a "Hole"
    let overGap = false;
    state.groundGaps.forEach(gap => {
        if (player.x > gap.x && player.x < gap.x + gap.w) overGap = true;
    });

    if (!overGap && player.y + player.h > groundLevel) {
        player.y = groundLevel - player.h;
        player.vy = 0;
        onGround = true;
    }
    player.grounded = onGround;

    // Transition to Tunnel if falling through hole
    if (player.y > state.viewportH + 100) {
        state.inTunnel = !state.inTunnel;
        player.y = -50;
        player.vx = 0;
        document.getElementById('stats-sector').innerText = state.inTunnel ? "Sector: Cu Chi Tunnels" : "Sector: Jungle Surface";
        document.getElementById('stats-sector').style.color = state.inTunnel ? "#ef4444" : "#60a5fa";
    }

    // Scroll
    state.scrollX = -player.x + 100;

    // Collisions
    state.intelBlocks.forEach(b => {
        if (b.active && player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
            b.active = false;
            triggerQuiz();
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, state.viewportW, state.viewportH);
    
    // Background gradient shift for tunnels
    const grad = ctx.createLinearGradient(0,0,0,state.viewportH);
    if (state.inTunnel) {
        grad.addColorStop(0, '#451a03'); grad.addColorStop(1, '#1c1917');
    } else {
        grad.addColorStop(0, '#064e3b'); grad.addColorStop(1, '#022c22');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,state.viewportW, state.viewportH);

    ctx.translate(state.scrollX, 0);

    // Ground
    ctx.fillStyle = state.inTunnel ? '#78350f' : '#14532d';
    let gX = Math.floor(-state.scrollX / 1000) * 1000 - 1000;
    for(let i=0; i<5; i++) {
        ctx.fillRect(gX + i*1000, state.viewportH - 80, 1000, 80);
    }
    
    // Gaps (Holes)
    ctx.fillStyle = '#020617';
    state.groundGaps.forEach(gap => {
        ctx.fillRect(gap.x, state.viewportH - 80, gap.w, 80);
        // Shaft lines
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.moveTo(gap.x, state.viewportH - 80); ctx.lineTo(gap.x, state.viewportH);
        ctx.moveTo(gap.x + gap.w, state.viewportH - 80); ctx.lineTo(gap.x + gap.w, state.viewportH);
        ctx.stroke();
    });

    // Intel Blocks
    state.intelBlocks.forEach(b => {
        if (!b.active) return;
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 24px Inter';
        ctx.textAlign = 'center';
        ctx.fillText('?', b.x + 25, b.y + 35);
    });

    // Player
    ctx.fillStyle = state.facingRight ? '#ef4444' : '#f87171';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Soldier Helmet
    ctx.fillStyle = '#064e3b';
    ctx.fillRect(player.x - 5, player.y, player.w + 10, 15);

    requestAnimationFrame(() => {});
}

window.onload = () => {
    resize();
    setupControls();
    initTracking();
    
    document.getElementById('btn-start').onclick = () => {
        recordDeployment();
        document.getElementById('start-screen').classList.add('hidden');
        state.gameStarted = true;
        state.gameActive = true;
        update();
    };
};

window.addEventListener('resize', resize);
</script>
</body>
</html>
