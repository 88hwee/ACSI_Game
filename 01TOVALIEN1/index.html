<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Local Hero: Versailles Defense</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#050505;
    font-family:Arial, sans-serif;
    touch-action:none;
    user-select:none;
    position:fixed;
    width:100%;
    height:100%;
}

#game-container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
    radial-gradient(circle at bottom,#1a1a2e 0%,#000 70%);
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

.option-btn{
    min-height:60px;
    border:2px solid #374151;
}

.correct{
    background:#059669 !important;
}

.wrong{
    background:#dc2626 !important;
}

.shake{
    animation:shake 0.3s;
}

@keyframes shake{
    20%{transform:translateX(-5px);}
    40%{transform:translateX(5px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
}

#hud{
    padding-top:calc(10px + env(safe-area-inset-top));
    padding-left:calc(12px + env(safe-area-inset-left));
    padding-right:calc(12px + env(safe-area-inset-right));
}

#mobile-controls{
    padding-bottom:calc(18px + env(safe-area-inset-bottom));
    padding-left:calc(18px + env(safe-area-inset-left));
    padding-right:calc(18px + env(safe-area-inset-right));
}
</style>
</head>

<body>

<div id="game-container">

<div id="hud"
class="absolute top-0 left-0 w-full flex justify-between items-center z-40 bg-black/50 backdrop-blur-sm border-b border-blue-900/30">

<div>
<div class="text-blue-400 text-[10px] font-bold">SCORE</div>
<div id="score-val" class="text-white text-lg font-mono">0000</div>
</div>

<div class="text-center">
<div class="text-red-400 text-[10px] font-bold">TIME</div>
<div id="timer-val" class="text-white text-xl font-mono">180s</div>
</div>

<div class="text-right">
<div class="text-green-400 text-[10px] font-bold">LIVES</div>
<div id="lives-container"></div>
</div>

</div>

<canvas id="gameCanvas"></canvas>

<!-- START SCREEN -->
<div id="start-screen"
class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/95 p-6 text-center">

<h1 class="text-4xl md:text-7xl font-black text-white italic uppercase mb-2">
Local Hero
</h1>

<h2 class="text-blue-500 text-xl md:text-3xl font-bold mb-8">
VERSAILLES DEFENSE
</h2>

<div class="max-w-md text-gray-300 text-sm md:text-base mb-8 space-y-3">

<p>Survive for <b>180 seconds</b>.</p>

<p>Wrong answer = lose 1 life.</p>

<p>You have 5 lives.</p>

<p>Missed enemies have no penalty.</p>

<p>Laptop: A/D or ← → to move. Space to shoot.</p>

</div>

<button id="start-btn"
class="w-full max-w-xs py-4 bg-blue-600 text-white font-black rounded-2xl text-lg active:scale-95">
START GAME
</button>

</div>

<!-- MCQ -->
<div id="mcq-modal"
class="hidden absolute inset-0 z-[100] flex items-center justify-center bg-black/90 p-4">

<div class="bg-gray-900 border-2 border-blue-500 rounded-3xl w-full max-w-md p-6 shadow-2xl">

<p id="q-category"
class="text-blue-400 text-xs font-bold uppercase mb-2">
Question
</p>

<h3 id="question-text"
class="text-lg md:text-xl text-white font-bold mb-6">
</h3>

<div id="options-container"
class="grid grid-cols-1 gap-3">
</div>

<div id="feedback-text"
class="mt-4 h-8 text-center text-sm font-bold">
</div>

</div>
</div>

<!-- END SCREEN -->
<div id="end-screen"
class="hidden absolute inset-0 z-[200] flex flex-col items-center justify-center bg-black p-8 text-center">

<h2 id="end-status"
class="text-3xl md:text-5xl font-black text-red-500 mb-4">
MISSION COMPLETE
</h2>

<div id="final-score-display"
class="text-6xl md:text-8xl font-black text-white mb-6">
0000
</div>

<p id="end-message"
class="text-gray-300 text-sm mb-10">
</p>

<button id="restart-btn"
class="w-full max-w-xs py-4 bg-white text-black font-black rounded-2xl">
PLAY AGAIN
</button>

</div>

<!-- MOBILE CONTROLS -->
<div id="mobile-controls"
class="absolute bottom-0 left-0 w-full flex justify-between items-end z-30 pointer-events-none">

<div class="flex gap-4 pointer-events-auto">

<button id="btn-left"
class="w-20 h-20 bg-white/10 rounded-2xl border border-white/20 text-white text-4xl">
‹
</button>

<button id="btn-right"
class="w-20 h-20 bg-white/10 rounded-2xl border border-white/20 text-white text-4xl">
›
</button>

</div>

<button id="btn-fire"
class="w-24 h-24 bg-red-600 rounded-full border-4 border-red-300 pointer-events-auto text-white font-black">
FIRE
</button>

</div>

</div>

<script>

const QUESTIONS = [
{
q:"Which article was the War Guilt Clause?",
a:"Article 231",
o:["Article 231","Article 105","Article 42","Article 15"]
},
{
q:"How much reparations was Germany forced to pay?",
a:"£6,600 million",
o:["£6,600 million","£3,300 million","£1,100 million","£9,900 million"]
},
{
q:"German army limited to how many men?",
a:"100,000 men",
o:["100,000 men","250,000 men","500,000 men","50,000 men"]
},
{
q:"Which territory returned to France?",
a:"Alsace-Lorraine",
o:["Alsace-Lorraine","Rhineland","Danzig","Saar"]
},
{
q:"What happened to the Rhineland?",
a:"Demilitarised",
o:["Demilitarised","Given to Italy","Split in two","Annexed"]
},
{
q:"Which body was created to keep peace?",
a:"League of Nations",
o:["League of Nations","United Nations","NATO","European Union"]
},
{
q:"Who proposed the Fourteen Points?",
a:"Woodrow Wilson",
o:["Woodrow Wilson","Lloyd George","Clemenceau","Kaiser Wilhelm"]
}
];

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let state = {
screen:"start",
score:0,
lives:5,
timeLeft:180,
pausedForMCQ:false,
lastSpawn:0,
lastFire:0,
spawnRate:2200,
qIndex:0,
questionPool:[],
correctAnswers:0,
totalAnswered:0,
viewport:{
w:window.innerWidth,
h:window.innerHeight
}
};

let player = {
x:0,
y:0,
w:60,
h:60,
speed:0,
movingLeft:false,
movingRight:false
};

let bullets = [];
let enemies = [];
let particles = [];
let timerInterval = null;

function init(){

resize();

window.addEventListener("resize",resize);

document.getElementById("start-btn").onclick = startGame;
document.getElementById("restart-btn").onclick = resetGame;

setupControls();

requestAnimationFrame(gameLoop);

}

function resize(){

const dpr = window.devicePixelRatio || 1;

state.viewport.w = window.innerWidth;
state.viewport.h = window.innerHeight;

canvas.width = state.viewport.w * dpr;
canvas.height = state.viewport.h * dpr;

canvas.style.width = state.viewport.w + "px";
canvas.style.height = state.viewport.h + "px";

ctx.setTransform(dpr,0,0,dpr,0,0);

const size = Math.min(state.viewport.w * 0.15,70);

player.w = size;
player.h = size;

player.y = state.viewport.h - (state.viewport.w < 768 ? 180 : 140);

/* MUCH SLOWER PLAYER */
player.speed = Math.min(5, state.viewport.w * 0.006);

if(state.screen === "start"){
player.x = state.viewport.w / 2 - player.w / 2;
}

}

function setupControls(){

const left = document.getElementById("btn-left");
const right = document.getElementById("btn-right");
const fireBtn = document.getElementById("btn-fire");

left.addEventListener("touchstart",e=>{
e.preventDefault();
player.movingLeft = true;
});

left.addEventListener("touchend",e=>{
e.preventDefault();
player.movingLeft = false;
});

right.addEventListener("touchstart",e=>{
e.preventDefault();
player.movingRight = true;
});

right.addEventListener("touchend",e=>{
e.preventDefault();
player.movingRight = false;
});

fireBtn.addEventListener("touchstart",e=>{
e.preventDefault();
fire();
});

window.addEventListener("keydown",e=>{

const key = e.key.toLowerCase();

if(key === "arrowleft" || key === "a"){
player.movingLeft = true;
}

if(key === "arrowright" || key === "d"){
player.movingRight = true;
}

if(key === " "){
fire();
}

});

window.addEventListener("keyup",e=>{

const key = e.key.toLowerCase();

if(key === "arrowleft" || key === "a"){
player.movingLeft = false;
}

if(key === "arrowright" || key === "d"){
player.movingRight = false;
}

});

}

function startGame(){

state.screen = "playing";
state.score = 0;
state.lives = 5;
state.timeLeft = 180;
state.pausedForMCQ = false;
state.spawnRate = 2200;
state.qIndex = 0;
state.correctAnswers = 0;
state.totalAnswered = 0;

state.questionPool = shuffle([...QUESTIONS]);

bullets = [];
enemies = [];
particles = [];

document.getElementById("start-screen").classList.add("hidden");
document.getElementById("end-screen").classList.add("hidden");

updateHUD();

if(timerInterval) clearInterval(timerInterval);

timerInterval = setInterval(()=>{

if(state.screen === "playing" && !state.pausedForMCQ){

state.timeLeft--;

updateHUD();

if(state.timeLeft <= 0){
endGame("MISSION COMPLETE");
}

}

},1000);

}

function resetGame(){

if(timerInterval) clearInterval(timerInterval);

state.screen = "start";

document.getElementById("end-screen").classList.add("hidden");
document.getElementById("start-screen").classList.remove("hidden");

resize();
updateHUD();

}

function fire(){

if(state.screen !== "playing") return;
if(state.pausedForMCQ) return;

const now = Date.now();

if(now - state.lastFire < 170) return;

/* BIGGER BULLETS */

bullets.push({
x:player.x + player.w/2 - 6,
y:player.y,
w:12,
h:36,
speed:state.viewport.h * 0.025
});

state.lastFire = now;

}

function update(){

if(state.screen !== "playing") return;
if(state.pausedForMCQ) return;

if(player.movingLeft){
player.x -= player.speed;
}

if(player.movingRight){
player.x += player.speed;
}

player.x = Math.max(0,Math.min(state.viewport.w-player.w,player.x));

bullets.forEach((b,i)=>{

b.y -= b.speed;

if(b.y < -50){
bullets.splice(i,1);
}

});

const now = Date.now();

if(now - state.lastSpawn > state.spawnRate){

spawnEnemy();

state.lastSpawn = now;

state.spawnRate = Math.max(1200,state.spawnRate - 5);

}

enemies.forEach((en,i)=>{

en.y += en.speed;

bullets.forEach((b,bi)=>{

if(checkCollision(b,en)){

bullets.splice(bi,1);
enemies.splice(i,1);

state.score += 50;

createExplosion(en.x + en.w/2,en.y + en.h/2);

updateHUD();

if(Math.random() < 0.35){
triggerMCQ();
}

}

});

/* NO CONSEQUENCE IF ENEMY ESCAPES */

if(en.y > state.viewport.h){
enemies.splice(i,1);
}

});

particles.forEach((p,i)=>{

p.x += p.vx;
p.y += p.vy;
p.life -= 0.03;

if(p.life <= 0){
particles.splice(i,1);
}

});

}

function spawnEnemy(){

const size = Math.min(state.viewport.w * 0.16,75);

enemies.push({

x:Math.random() * (state.viewport.w - size),

y:-size,

w:size,
h:size,

/* MUCH SLOWER ENEMIES */

speed:(0.7 + Math.random() * 0.6) * (state.viewport.h / 800)

});

}

function draw(){

ctx.clearRect(0,0,state.viewport.w,state.viewport.h);

drawPlayer();

bullets.forEach(b=>{

ctx.fillStyle = "#60A5FA";

ctx.shadowBlur = 12;
ctx.shadowColor = "#60A5FA";

ctx.fillRect(b.x,b.y,b.w,b.h);

ctx.shadowBlur = 0;

});

enemies.forEach(en=>{

ctx.fillStyle = "#ef4444";

ctx.beginPath();

ctx.arc(
en.x + en.w/2,
en.y + en.h/2,
en.w/2,
0,
Math.PI * 2
);

ctx.fill();

});

particles.forEach(p=>{

ctx.globalAlpha = p.life;

ctx.fillStyle = "#facc15";

ctx.beginPath();

ctx.arc(p.x,p.y,3,0,Math.PI*2);

ctx.fill();

ctx.globalAlpha = 1;

});

}

function drawPlayer(){

ctx.fillStyle = "#3b82f6";

ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle = "#93c5fd";

ctx.fillRect(
player.x + player.w*0.35,
player.y - 12,
player.w*0.3,
14
);

}

function triggerMCQ(){

state.pausedForMCQ = true;

document.getElementById("mcq-modal").classList.remove("hidden");

renderQuestion();

}

function renderQuestion(){

if(state.qIndex >= state.questionPool.length){

state.questionPool = shuffle([...QUESTIONS]);
state.qIndex = 0;

}

const q = state.questionPool[state.qIndex];

document.getElementById("q-category").innerText =
`Question ${state.qIndex + 1}/${state.questionPool.length}`;

document.getElementById("question-text").innerText = q.q;

const container = document.getElementById("options-container");

const feedback = document.getElementById("feedback-text");

container.innerHTML = "";
feedback.innerText = "";

shuffle([...q.o]).forEach(opt=>{

const btn = document.createElement("button");

btn.className =
"option-btn w-full px-5 py-3 text-left text-white rounded-2xl bg-gray-800 font-bold text-sm";

btn.innerText = opt;

btn.onclick = ()=>handleAnswer(opt,q.a,btn);

container.appendChild(btn);

});

}

function handleAnswer(selected,correct,btn){

const allBtns = document.querySelectorAll(".option-btn");

allBtns.forEach(b=>b.disabled = true);

state.totalAnswered++;

if(selected === correct){

btn.classList.add("correct");

state.correctAnswers++;

state.score += 150;

state.qIndex++;

updateHUD();

document.getElementById("feedback-text").innerText = "Correct!";
document.getElementById("feedback-text").style.color = "#34d399";

setTimeout(resumeGame,700);

}else{

btn.classList.add("wrong");

allBtns.forEach(b=>{

if(b.innerText === correct){
b.classList.add("correct");
}

});

/* LOSE ONE LIFE */

state.lives--;

updateHUD();

state.qIndex++;

document.getElementById("feedback-text").innerText =
`Wrong! Correct: ${correct}`;

document.getElementById("feedback-text").style.color = "#f87171";

document.getElementById("game-container").classList.add("shake");

setTimeout(()=>{
document.getElementById("game-container").classList.remove("shake");
},300);

/* GAME CONTINUES EVEN AT 0 LIVES */

if(state.lives <= 0){

state.lives = 0;

updateHUD();

}

setTimeout(resumeGame,1500);

}

}

function resumeGame(){

document.getElementById("mcq-modal").classList.add("hidden");

state.pausedForMCQ = false;

}

function updateHUD(){

document.getElementById("score-val").innerText =
state.score.toString().padStart(4,"0");

document.getElementById("timer-val").innerText =
`${state.timeLeft}s`;

document.getElementById("lives-container").innerHTML =
"🛡️".repeat(state.lives);

}

function endGame(reason){

state.screen = "end";

if(timerInterval) clearInterval(timerInterval);

document.getElementById("mcq-modal").classList.add("hidden");

document.getElementById("end-screen").classList.remove("hidden");

const accuracy =
state.totalAnswered > 0
? Math.round((state.correctAnswers/state.totalAnswered)*100)
: 0;

document.getElementById("end-status").innerText = reason;

document.getElementById("final-score-display").innerText =
state.score.toString().padStart(4,"0");

document.getElementById("end-message").innerText =
`Accuracy: ${accuracy}% | Correct: ${state.correctAnswers}/${state.totalAnswered}`;

}

function checkCollision(a,b){

return(
a.x < b.x + b.w &&
a.x + a.w > b.x &&
a.y < b.y + b.h &&
a.y + a.h > b.y
);

}

function createExplosion(x,y){

for(let i=0;i<15;i++){

particles.push({

x,
y,

vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,

life:1

});

}

}

function gameLoop(){

update();

draw();

requestAnimationFrame(gameLoop);

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j = Math.floor(Math.random()*(i+1));

[arr[i],arr[j]] = [arr[j],arr[i]];

}

return arr;

}

window.onload = init;

</script>

</body>
</html>
