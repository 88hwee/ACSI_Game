<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clash of Laws: James Birch vs. The Chiefs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
            --sar: env(safe-area-inset-right);
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body { 
            margin: 0; 
            background-color: #f8fafc; /* Slate 50 */
            font-family: 'Inter', sans-serif; 
            color: #1e293b;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .serif-font { font-family: 'Crimson Pro', serif; }

        .card-container {
            perspective: 1000px;
            aspect-ratio: 1 / 1;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1rem;
            padding: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-front {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
        }

        .card-back {
            background-color: #ffffff;
            border: 3px solid #3b82f6; /* Blue 500 */
            transform: rotateY(180deg);
            font-size: 0.75rem;
            line-height: 1.2;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .card-back { font-size: 0.9rem; }
        }

        .card-matched .card-inner {
            cursor: default;
        }
        
        .card-matched .card-back {
            border-color: #10b981; /* Emerald 500 */
            background-color: #ecfdf5; /* Emerald 50 */
            color: #065f46;
        }

        #game-over-overlay {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto w-full flex-1 flex flex-col">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-5xl font-black serif-font text-slate-900 mb-2">Clash of Laws</h1>
            <p class="text-slate-500 font-medium text-sm md:text-base">James Birch vs. The Malay Chiefs (Perak, 1875)</p>
        </header>

        <!-- Stats Bar -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-center">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Tension Timeline</p>
                <p id="timer-display" class="text-2xl font-black text-blue-600">90s</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-center">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Conflicts Identified</p>
                <p id="matches-display" class="text-2xl font-black text-emerald-600">0/4</p>
            </div>
        </div>

        <!-- Instructions -->
        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-2xl mb-8">
            <p class="text-blue-800 text-sm font-bold">
                Goal: Match the <span class="underline decoration-blue-300">Malay Law</span> with the <span class="underline decoration-blue-300">British Edict</span> that caused the historical conflict.
            </p>
        </div>

        <!-- Card Grid -->
        <div id="card-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6 flex-1 items-start">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white rounded-[2.5rem] p-8 md:p-12 max-w-lg w-full shadow-2xl border-8 border-slate-800">
            <h2 id="result-title" class="text-3xl md:text-4xl font-black serif-font mb-4 text-slate-900 uppercase italic">Mission Result</h2>
            <div id="result-summary" class="mb-8 space-y-4">
                <p id="result-message" class="text-slate-600 font-medium leading-relaxed"></p>
                <div class="flex justify-center gap-8 py-4 border-y border-slate-100">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Time Used</p>
                        <p id="final-time" class="text-2xl font-black text-slate-900">0s</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Matches</p>
                        <p id="final-matches" class="text-2xl font-black text-slate-900">0/4</p>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-slate-800 transition-colors uppercase tracking-widest active:scale-95">
                Restart Challenge
            </button>
        </div>
    </div>

    <script type="module">
        const CONFLICTS = [
            { 
                id: 1, 
                group: "JUDICIAL AUTHORITY", 
                malay: "Chiefs held power to judge all cases, including capital offenses, and punish offenders.", 
                birch: "All court proceedings must now be heard by the Resident, invalidating Malay judgments." 
            },
            { 
                id: 2, 
                group: "REVENUE/TAXATION", 
                malay: "Chiefs collected customs duties, fees, and taxes at river checkpoints.", 
                birch: "All revenue collection is centralized and managed exclusively by British officials." 
            },
            { 
                id: 3, 
                group: "ABOLITION OF SLAVERY", 
                malay: "Debt slavery was a customary practice (adat) and key source of labor.", 
                birch: "Slavery is abolished by edict, undermining the Chiefs' social standing." 
            },
            { 
                id: 4, 
                group: "LAND & LICENSES", 
                malay: "The Sultan granted all licenses for tin mining and controlled all land use.", 
                birch: "The Resident issues all permits, seizing control of Perak's resources." 
            }
        ];

        let state = {
            matchesFound: 0,
            flippedCards: [],
            isProcessing: false,
            timeElapsed: 0,
            timer: null,
            totalTime: 90
        };

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function createDeck() {
            let deck = [];
            CONFLICTS.forEach(c => {
                deck.push({ id: c.id, type: 'MALAY', text: c.malay, group: c.group });
                deck.push({ id: c.id, type: 'BRITISH', text: c.birch, group: c.group });
            });
            return shuffle(deck);
        }

        function initGame() {
            const grid = document.getElementById('card-grid');
            const deck = createDeck();

            deck.forEach((card, index) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.innerHTML = `
                    <div class="card-inner" data-id="${card.id}" data-type="${card.type}" id="card-${index}">
                        <div class="card-front">
                            <span class="text-[10px] font-black text-slate-300 mb-2 uppercase tracking-tighter">${card.type === 'MALAY' ? 'Malay Tradition' : 'Colonial Edict'}</span>
                            <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center border border-slate-100">
                                <span class="text-slate-400 font-black text-xl italic">?</span>
                            </div>
                        </div>
                        <div class="card-back">
                            <p class="font-bold text-slate-900 leading-tight mb-2">${card.text}</p>
                            <span class="text-[8px] font-black bg-slate-100 px-2 py-0.5 rounded-full text-slate-400 uppercase tracking-widest mt-auto">${card.group}</span>
                        </div>
                    </div>
                `;

                container.querySelector('.card-inner').onclick = function() {
                    handleCardFlip(this);
                };
                grid.appendChild(container);
            });

            startTimer();
        }

        function handleCardFlip(cardElement) {
            if (state.isProcessing || cardElement.classList.contains('flipped') || cardElement.parentElement.classList.contains('card-matched')) {
                return;
            }

            cardElement.classList.add('flipped');
            state.flippedCards.push(cardElement);

            if (state.flippedCards.length === 2) {
                state.isProcessing = true;
                checkForMatch();
            }
        }

        function checkForMatch() {
            const [card1, card2] = state.flippedCards;
            const isMatch = card1.dataset.id === card2.dataset.id && card1.dataset.type !== card2.dataset.type;

            if (isMatch) {
                state.matchesFound++;
                document.getElementById('matches-display').innerText = `${state.matchesFound}/4`;
                
                setTimeout(() => {
                    card1.parentElement.classList.add('card-matched');
                    card2.parentElement.classList.add('card-matched');
                    state.flippedCards = [];
                    state.isProcessing = false;

                    if (state.matchesFound === 4) {
                        endGame(true);
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    state.flippedCards = [];
                    state.isProcessing = false;
                }, 1200);
            }
        }

        function startTimer() {
            state.timer = setInterval(() => {
                state.timeElapsed++;
                const remaining = state.totalTime - state.timeElapsed;
                document.getElementById('timer-display').innerText = `${remaining}s`;

                if (remaining <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function endGame(isWin) {
            clearInterval(state.timer);
            const overlay = document.getElementById('game-over-overlay');
            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-message');
            
            overlay.classList.remove('hidden');
            document.getElementById('final-time').innerText = `${state.timeElapsed}s`;
            document.getElementById('final-matches').innerText = `${state.matchesFound}/4`;

            if (isWin) {
                title.innerText = "Conflict Identified";
                title.classList.add('text-emerald-600');
                msg.innerText = "Excellent. You identified all 4 core areas of tension. Birch's total disregard for local authority and customs led to the seizure of power that ultimately provoked the events at Pasir Salak.";
            } else {
                title.innerText = "Tension Boiling Over";
                title.classList.add('text-red-600');
                msg.innerText = "Time ran out. The inability to resolve these cultural and legal clashes led to irreversible conflict. The Chiefs' loss of revenue and social standing created a unified resistance against the British Resident.";
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
