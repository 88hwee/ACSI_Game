<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origin | Academic Integrity Suite</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX Transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #dbeafe; border-radius: 10px; }
        .firework-particle { position: absolute; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSessionActive, setIsSessionActive] = useState(false);
            const [sessionTime, setSessionTime] = useState(0);
            const [sources, setSources] = useState([]);
            const [draftContent, setDraftContent] = useState('');
            const [scratchpadContent, setScratchpadContent] = useState('');
            const [versions, setVersions] = useState([]);
            const [events, setEvents] = useState([]); 
            const [typingStats, setTypingStats] = useState({ keystrokes: 0, pastes: 0 });
            const [showFirework, setShowFirework] = useState(false);
            const [isFinalView, setIsFinalView] = useState(false);
            
            const timerRef = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, events, sources, showFirework, isFinalView, versions]);

            const toggleSession = () => {
                if (!isSessionActive) {
                    logEvent('Session Started', 'Work period initiated');
                    setIsSessionActive(true);
                } else {
                    logEvent('Session Paused', `Worked for ${formatTime(sessionTime)}`);
                    setIsSessionActive(false);
                }
            };

            useEffect(() => {
                if (isSessionActive) {
                    timerRef.current = setInterval(() => {
                        setSessionTime(prev => {
                            const newTime = prev + 1;
                            if (newTime > 0 && newTime % 1800 === 0) triggerFirework();
                            return newTime;
                        });
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isSessionActive]);

            const triggerFirework = () => {
                setShowFirework(true);
                logEvent('Milestone Reached', '30 minutes of deep focus achieved!');
                setTimeout(() => setShowFirework(false), 5000);
            };

            const saveVersion = () => {
                const newVersion = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleString(),
                    wordCount: draftContent.trim() ? draftContent.trim().split(/\s+/).length : 0,
                    content: draftContent
                };
                setVersions([newVersion, ...versions]);
                logEvent('Snapshot Saved', `Version created at ${newVersion.wordCount} words`);
            };

            const logEvent = (action, details) => {
                const newEvent = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleTimeString(),
                    action,
                    details
                };
                setEvents(prev => [newEvent, ...prev]);
            };

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + 'h ' : ''}${m}m ${s}s`;
            };

            const handleDraftChange = (e) => {
                const newValue = e.target.value;
                if (newValue.length > draftContent.length + 50) {
                    setTypingStats(prev => ({ ...prev, pastes: prev.pastes + 1 }));
                    logEvent('Security Alert', `Large text block detected`);
                } else {
                    setTypingStats(prev => ({ ...prev, keystrokes: prev.keystrokes + 1 }));
                }
                setDraftContent(newValue);
            };

            const addSource = (e) => {
                e.preventDefault();
                const title = e.target.title.value;
                const url = e.target.url.value;
                const page = e.target.page.value;
                if (!title || !url) return;
                const isVerified = url.includes('.edu') || url.includes('.gov') || url.includes('scholar');
                setSources([...sources, { id: Date.now(), title, url, page, isVerified }]);
                logEvent('Research Verified', `${title} (Pg: ${page || 'N/A'})`);
                e.target.reset();
            };

            const FireworkEffect = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none">
                    <div className="absolute inset-0 bg-blue-600/25 backdrop-blur-lg animate-pulse" />
                    <div className="text-center animate-bounce bg-white p-16 rounded-[4rem] shadow-[0_0_100px_rgba(37,99,235,0.4)] border-8 border-blue-500">
                        <Icon name="trophy" size={100} className="text-blue-600 mx-auto mb-6" />
                        <h2 className="text-7xl font-black text-blue-900 tracking-tighter">BOOM! 30 MINS!</h2>
                        <p className="text-blue-600 font-black mt-6 text-2xl uppercase tracking-[0.2em]">Authentic Progress Confirmed</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-white">
                    {showFirework && <FireworkEffect />}

                    {/* Navigation Sidebar */}
                    <nav className="w-full md:w-80 p-10 border-r-4 border-blue-50 flex flex-col bg-white">
                        <div className="flex items-center gap-4 text-blue-600 mb-20">
                            <div className="bg-blue-600 p-3.5 rounded-[1.25rem] text-white shadow-xl shadow-blue-100">
                                <Icon name="shield-check" size={32} />
                            </div>
                            <span className="font-black text-3xl italic tracking-tighter uppercase">Origin</span>
                        </div>

                        <div className="space-y-4 flex-grow">
                            {[
                                { id: 'dashboard', icon: 'activity', label: 'Pulse' },
                                { id: 'editor', icon: 'file-text', label: 'Drafting' },
                                { id: 'sources', icon: 'book-open', label: 'Research' },
                                { id: 'report', icon: 'trophy', label: 'Integrity' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} 
                                    className={`w-full flex items-center gap-5 px-8 py-5 rounded-[1.75rem] font-black text-base transition-all ${activeTab === item.id ? 'bg-blue-600 text-white shadow-2xl translate-x-2' : 'text-blue-300 hover:text-blue-600 hover:bg-blue-50'}`}>
                                    <Icon name={item.icon} size={24} />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <div className="mt-auto">
                            <div className="p-8 bg-blue-50 rounded-[2.5rem] border-2 border-blue-100 shadow-sm shadow-blue-50">
                                <div className="flex items-center gap-2 mb-4">
                                    <Icon name="sparkles" size={18} className="text-blue-600" />
                                    <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest">Progress Bar</span>
                                </div>
                                <div className="w-full bg-blue-200 h-4 rounded-full overflow-hidden shadow-inner border border-white">
                                    <div className="bg-blue-600 h-full transition-all duration-1000 ease-out" style={{ width: `${(sessionTime % 1800) / 1800 * 100}%` }} />
                                </div>
                                <p className="text-[10px] font-black text-blue-400 mt-4 text-center uppercase tracking-[0.2em]">
                                    {Math.floor((1800 - (sessionTime % 1800)) / 60)}m TO NEXT REWARD
                                </p>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-grow p-10 md:p-16 overflow-y-auto">
                        <header className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-16 gap-8">
                            <div>
                                <h1 className="text-6xl font-black text-blue-900 tracking-tighter capitalize">{activeTab}</h1>
                                <p className="text-blue-400 font-black text-xs uppercase tracking-[0.3em] mt-3 flex items-center gap-3">
                                    <span className="w-2.5 h-2.5 rounded-full bg-blue-600 animate-pulse shadow-lg shadow-blue-200" />
                                    Security Verification Active
                                </p>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={toggleSession} className={`px-12 py-5 rounded-full font-black text-lg uppercase tracking-widest transition-all ${isSessionActive ? 'bg-white text-red-500 border-4 border-red-500 shadow-xl' : 'bg-blue-600 text-white shadow-[0_20px_50px_rgba(37,99,235,0.3)] hover:bg-blue-700 hover:-translate-y-1'}`}>
                                    {isSessionActive ? 'End Session' : 'Begin Work'}
                                </button>
                            </div>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                <div className="lg:col-span-2 space-y-12">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-10">
                                        <div className={`p-10 rounded-[3rem] border-4 transition-all duration-500 bg-white ${isSessionActive ? 'border-blue-600 shadow-2xl scale-105' : 'border-blue-50 shadow-sm'}`}>
                                            <Icon name="clock" size={48} className="text-blue-600 mb-6" />
                                            <h3 className="text-blue-400 text-xs font-black uppercase tracking-[0.2em]">Study Time</h3>
                                            <p className="text-6xl font-black text-blue-900 mt-3 tracking-tighter">{formatTime(sessionTime)}</p>
                                        </div>
                                        <div className="p-10 rounded-[3rem] border-4 border-blue-50 bg-white shadow-sm">
                                            <Icon name="activity" size={48} className="text-blue-600 mb-6" />
                                            <h3 className="text-blue-400 text-xs font-black uppercase tracking-[0.2em]">Authenticity</h3>
                                            <p className="text-6xl font-black text-blue-900 mt-3 tracking-tighter">
                                                {typingStats.keystrokes > 0 ? Math.round((typingStats.keystrokes / (typingStats.keystrokes + typingStats.pastes)) * 100) : 100}%
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-blue-50/30 p-12 rounded-[3.5rem] border-4 border-blue-100 border-dashed">
                                        <div className="flex justify-between items-center mb-10">
                                            <h3 className="text-2xl font-black text-blue-900 flex items-center gap-4 uppercase tracking-tighter">
                                                <Icon name="history" size={28} className="text-blue-600" /> Progression History
                                            </h3>
                                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest bg-white px-4 py-2 rounded-full border border-blue-100">Messy is Proof of Work</p>
                                        </div>
                                        <div className="space-y-5 max-h-[400px] overflow-y-auto pr-4 custom-scrollbar">
                                            {versions.map(v => (
                                                <div key={v.id} className="bg-white p-6 rounded-3xl border-2 border-blue-50 flex justify-between items-center">
                                                    <div>
                                                        <p className="text-sm font-black text-blue-900">Snapshot: {v.wordCount} Words</p>
                                                        <p className="text-[10px] text-blue-400 font-bold uppercase">{v.timestamp}</p>
                                                    </div>
                                                    <button onClick={() => { setDraftContent(v.content); logEvent('Reverted', `Back to ${v.wordCount} word version`); }} className="text-blue-600 hover:text-blue-900"><Icon name="arrow-right-circle" size={20}/></button>
                                                </div>
                                            ))}
                                            {versions.length === 0 && <p className="text-center py-10 text-blue-200 font-black italic">Save snapshots to track your evolution...</p>}
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-12">
                                    <div className="bg-blue-600 p-12 rounded-[3.5rem] text-white shadow-[0_30px_70px_rgba(37,99,235,0.4)]">
                                        <Icon name="shield-check" size={56} className="mb-8 text-blue-100" />
                                        <h3 className="text-3xl font-black mb-6 tracking-tight italic">Verified Evolution</h3>
                                        <p className="text-blue-100 text-base font-bold leading-relaxed opacity-90">Our algorithm values the transition from initial messy notes to final polish as high-integrity human effort.</p>
                                    </div>
                                    <div className="bg-white p-12 rounded-[3.5rem] border-4 border-blue-50 shadow-sm">
                                        <h4 className="text-[10px] font-black text-blue-300 uppercase tracking-[0.4em] mb-10">Study Portfolio</h4>
                                        <div className="space-y-4">
                                            {sources.map(s => (
                                                <div key={s.id} className="p-5 bg-blue-50/50 rounded-2xl flex items-center justify-between border border-blue-50">
                                                    <div className="truncate pr-4">
                                                        <p className="text-xs font-black text-blue-900 truncate">{s.title}</p>
                                                        <p className="text-[9px] font-bold text-blue-400">Pg: {s.page || 'N/A'}</p>
                                                    </div>
                                                    <Icon name="check-circle" size={16} className="text-blue-600 shrink-0" />
                                                </div>
                                            ))}
                                            {sources.length === 0 && <p className="text-blue-100 italic text-center py-10">No studies linked</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'editor' && (
                            <div className="flex flex-col h-[75vh] gap-8">
                                <div className="bg-white p-8 rounded-[3rem] border-4 border-blue-50 flex items-center justify-between shadow-sm">
                                    <div className="flex items-center gap-6">
                                        <button onClick={() => setIsFinalView(false)} className={`px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all ${!isFinalView ? 'bg-blue-600 text-white shadow-xl' : 'text-blue-300 hover:bg-blue-50'}`}>Messy Scratchpad</button>
                                        <button onClick={() => setIsFinalView(true)} className={`px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all ${isFinalView ? 'bg-blue-900 text-white shadow-xl' : 'text-blue-300 hover:bg-blue-50'}`}>Submission Draft</button>
                                    </div>
                                    <button onClick={saveVersion} className="px-6 py-3 bg-white border-2 border-blue-600 text-blue-600 rounded-2xl text-xs font-black uppercase hover:bg-blue-50 transition-all flex items-center gap-2">
                                        <Icon name="camera" size={16} /> Snapshot Proof
                                    </button>
                                </div>
                                {isFinalView ? (
                                    <textarea value={draftContent} onChange={handleDraftChange} placeholder="This is your polished presentation area. Refine your messy notes here."
                                        className="flex-grow p-16 bg-white rounded-[4rem] border-4 border-blue-900 focus:outline-none focus:border-blue-600 text-blue-900 leading-[2.2] text-xl font-serif shadow-xl resize-none placeholder:italic"
                                    />
                                ) : (
                                    <textarea value={scratchpadContent} onChange={(e) => setScratchpadContent(e.target.value)} placeholder="BE MESSY HERE! Paste brain dumps, half-baked ideas, and messy notes. This proves your thinking process."
                                        className="flex-grow p-16 bg-blue-50/30 rounded-[4rem] border-4 border-blue-200 border-dashed focus:outline-none focus:border-blue-400 text-blue-800 leading-[1.8] text-lg font-mono shadow-inner resize-none placeholder:text-blue-200"
                                    />
                                )}
                            </div>
                        )}

                        {activeTab === 'sources' && (
                            <div className="space-y-12">
                                <div className="bg-white p-16 rounded-[4rem] border-4 border-blue-50 shadow-sm">
                                    <h3 className="text-4xl font-black text-blue-900 mb-12 tracking-tighter">Link Reference Study</h3>
                                    <form onSubmit={addSource} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-blue-400 tracking-widest ml-1">Study Title</label>
                                            <input name="title" placeholder="e.g., Organic Chemistry Vol. 2" className="w-full px-8 py-5 bg-blue-50/50 rounded-2xl border-2 border-transparent focus:border-blue-400 focus:outline-none font-bold text-blue-900 transition-all" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-blue-400 tracking-widest ml-1">Source Link / DOI</label>
                                            <input name="url" placeholder="URL Address" className="w-full px-8 py-5 bg-blue-50/50 rounded-2xl border-2 border-transparent focus:border-blue-400 focus:outline-none font-bold text-blue-900 transition-all" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-blue-400 tracking-widest ml-1">Specific Pages</label>
                                            <input name="page" placeholder="e.g., 45-50" className="w-full px-8 py-5 bg-blue-50/50 rounded-2xl border-2 border-transparent focus:border-blue-400 focus:outline-none font-bold text-blue-900 transition-all" />
                                        </div>
                                        <button className="lg:col-span-3 bg-blue-600 text-white py-6 rounded-[2rem] font-black text-2xl hover:bg-blue-700 shadow-[0_20px_40px_rgba(37,99,235,0.2)] transition-all">
                                            VERIFY & LOG REFERENCE
                                        </button>
                                    </form>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {sources.map(s => (
                                        <div key={s.id} className="bg-white p-10 rounded-[3rem] border-4 border-blue-50 hover:border-blue-200 transition-all shadow-sm group">
                                            <div className="flex justify-between items-start mb-8">
                                                <div className={`p-4 rounded-[1.25rem] ${s.isVerified ? 'bg-blue-600 text-white shadow-lg' : 'bg-blue-50 text-blue-300'}`}>
                                                    <Icon name="book-open" size={28} />
                                                </div>
                                                <span className="text-[10px] font-black text-blue-300 uppercase tracking-widest mt-2">ID: {s.id.toString().slice(-4)}</span>
                                            </div>
                                            <h4 className="text-2xl font-black text-blue-900 mb-2 line-clamp-2 leading-tight">{s.title}</h4>
                                            <p className="text-sm font-bold text-blue-500 mb-6 flex items-center gap-2">
                                                <Icon name="layers" size={14} /> Pages: {s.page || 'Full Document'}
                                            </p>
                                            <div className="pt-6 border-t-2 border-blue-50 flex items-center justify-between">
                                                <a href={s.url} target="_blank" rel="noreferrer" className="text-xs font-black text-blue-600 hover:underline uppercase tracking-widest">Open Source</a>
                                                {s.isVerified && <Icon name="check-circle" size={16} className="text-emerald-500" />}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'report' && (
                            <div className="max-w-4xl mx-auto bg-white p-20 rounded-[6rem] border-8 border-blue-50 text-center shadow-[0_60px_120px_rgba(0,0,0,0.05)] animate-in zoom-in-95 duration-700">
                                <div className="mb-20">
                                    <div className="w-40 h-40 bg-blue-600 text-white rounded-full flex items-center justify-center mx-auto mb-12 shadow-[0_30px_70px_rgba(37,99,235,0.4)]">
                                        <Icon name="shield-check" size={80} />
                                    </div>
                                    <h2 className="text-7xl font-black text-blue-900 tracking-tighter mb-4 italic uppercase">Origin Passport</h2>
                                    <p className="text-blue-400 font-black uppercase tracking-[0.6em] text-xs">Official Integrity Audit Record</p>
                                </div>

                                <div className="grid grid-cols-2 gap-12 mb-20">
                                    <div className="bg-blue-50/50 p-12 rounded-[4rem] border-2 border-blue-100 shadow-inner">
                                        <p className="text-6xl font-black text-blue-600 tracking-tighter">{formatTime(sessionTime)}</p>
                                        <p className="text-xs font-black text-blue-400 uppercase tracking-widest mt-5 italic">Human Effort Verified</p>
                                    </div>
                                    <div className="bg-blue-50/50 p-12 rounded-[4rem] border-2 border-blue-100 shadow-inner">
                                        <p className="text-6xl font-black text-blue-600 tracking-tighter">{versions.length}</p>
                                        <p className="text-xs font-black text-blue-400 uppercase tracking-widest mt-5 italic">Evolution Versions Tracked</p>
                                    </div>
                                </div>

                                <button className="w-full bg-blue-900 text-white py-10 rounded-[3rem] font-black text-3xl hover:bg-black transition-all shadow-2xl flex items-center justify-center gap-6 group">
                                    <Icon name="download" size={40} className="group-hover:translate-y-1 transition-transform" />
                                    GENERATE FULL AUDIT
                                </button>
                                <div className="mt-16 flex flex-col items-center gap-4">
                                    <div className="flex items-center gap-3 text-blue-200">
                                        <Icon name="shield-check" size={20} />
                                        <p className="text-[10px] font-black uppercase tracking-[0.5em]">256-Bit Encrypted Timestamp Proof</p>
                                    </div>
                                    <p className="text-[9px] text-blue-300 font-bold max-w-sm leading-relaxed opacity-60 italic text-center">
                                        This report highlights the evolution from scratch notes to final draft as proof of intellectual authorship.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
